<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>远古 - 帝国时代风格游戏</title>
    <script src="/js/howler.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            overflow: hidden;
            color: #fff;
        }
        
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        }
        
        .auth-box {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border: 2px solid #8B4513;
            box-shadow: 0 0 30px rgba(139, 69, 19, 0.3);
        }
        
        .auth-box h1 { text-align: center; margin-bottom: 30px; font-size: 2.5em; color: #FFD700; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .auth-tabs { display: flex; margin-bottom: 25px; border-bottom: 2px solid #8B4513; }
        .auth-tab {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        .auth-tab.active { color: #FFD700; border-bottom: 2px solid #FFD700; margin-bottom: -2px; }
        
        .auth-form input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid #8B4513;
            border-radius: 4px;
            background: #1a1a1a;
            color: #fff;
            font-size: 15px;
        }
        .auth-form input::placeholder { color: #888; }
        .auth-form button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            border: none;
            border-radius: 4px;
            background: linear-gradient(180deg, #4a7c59 0%, #3a5c49 100%);
            color: #fff;
            font-size: 17px;
            cursor: pointer;
            border: 1px solid #8B4513;
            transition: all 0.3s;
        }
        .auth-form button:hover { background: linear-gradient(180deg, #5a8c69 0%, #4a6c59 100%); transform: translateY(-1px); }
        
        .lobby-container { display: none; padding: 60px; background: #0a0a0a; min-height: 100vh; }
        .lobby-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
            padding: 25px;
            background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%);
            border-radius: 8px;
            border: 2px solid #8B4513;
        }
        .lobby-header h1 { font-size: 2.2em; color: #FFD700; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .user-info { display: flex; align-items: center; gap: 25px; }
        .user-info button { padding: 12px 25px; background: #8B0000; border: 1px solid #8B4513; border-radius: 4px; color: #fff; cursor: pointer; font-size: 15px; transition: all 0.3s; }
        .user-info button:hover { background: #a00000; }
        
        .game-modes { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .game-mode-card {
            background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%);
            border: 2px solid #8B4513;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .game-mode-card:hover { transform: translateY(-8px); border-color: #FFD700; background: linear-gradient(180deg, #3a3a3a 0%, #2a2a2a 100%); box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2); }
        .game-mode-card h3 { font-size: 1.6em; margin-bottom: 12px; color: #FFD700; }
        .game-mode-card p { color: #aaa; font-size: 1em; }
        
        .game-container { display: none; width: 100vw; height: 100vh; position: relative; }
        
        .game-canvas { display: block; background: #3d6b4a; }
        
        .resource-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            display: flex;
            justify-content: center;
            gap: 35px;
            padding: 8px 20px;
            background: linear-gradient(180deg, rgba(42, 42, 42, 0.98) 0%, rgba(26, 26, 26, 0.98) 100%);
            border-bottom: 3px solid #8B4513;
            z-index: 100;
        }
        .resource-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            background: rgba(26, 26, 26, 0.8);
            border-radius: 4px;
            border: 1px solid #8B4513;
        }
        .resource-icon { font-size: 1.5em; }
        .resource-value { font-size: 1.1em; font-weight: bold; min-width: 55px; text-align: right; color: #FFD700; }
        
        .bottom-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 180px;
            display: flex;
            background: linear-gradient(0deg, rgba(42, 42, 42, 0.98) 0%, rgba(26, 26, 26, 0.98) 100%);
            border-top: 3px solid #8B4513;
            z-index: 100;
        }
        
        .selection-panel {
            width: 240px;
            padding: 15px;
            border-right: 2px solid #8B4513;
            background: rgba(26, 26, 26, 0.9);
        }
        .selection-panel h3 { color: #FFD700; font-size: 1.1em; margin-bottom: 10px; }
        .selection-panel p { color: #aaa; font-size: 0.9em; margin: 5px 0; }
        .selection-panel .unit-count { color: #00ff00; font-weight: bold; font-size: 1.2em; }
        
        .command-panel {
            flex: 1;
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 8px;
            background: rgba(26, 26, 26, 0.9);
        }
        .command-btn {
            padding: 8px 5px;
            background: linear-gradient(180deg, #3a3a3a 0%, #2a2a2a 100%);
            border: 1px solid #8B4513;
            border-radius: 4px;
            color: #fff;
            cursor: pointer;
            font-size: 0.8em;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            transition: all 0.2s;
        }
        .command-btn:hover { background: linear-gradient(180deg, #4a4a4a 0%, #3a3a3a 100%); border-color: #FFD700; transform: translateY(-2px); }
        .command-btn.selected { background: linear-gradient(180deg, #5a5a5a 0%, #4a4a4a 100%); border-color: #FFD700; box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
        .command-btn .icon { font-size: 1.6em; }
        .command-btn .cost { font-size: 0.7em; color: #FFD700; }
        .command-btn .label { font-size: 0.75em; }
        
        .minimap-panel {
            width: 240px;
            padding: 10px;
            border-left: 2px solid #8B4513;
            background: rgba(26, 26, 26, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .minimap-panel canvas {
            width: 200px;
            height: 150px;
            background: #3d6b4a;
            border: 2px solid #8B4513;
            border-radius: 4px;
            cursor: pointer;
        }
        .minimap-label { color: #aaa; font-size: 0.85em; margin-top: 10px; }
        .reset-zoom-btn {
            margin-top: 10px;
            padding: 6px 12px;
            background: linear-gradient(180deg, #3a3a3a 0%, #2a2a2a 100%);
            border: 1px solid #8B4513;
            border-radius: 4px;
            color: #fff;
            cursor: pointer;
            font-size: 0.8em;
            transition: all 0.2s;
        }
        .reset-zoom-btn:hover { background: linear-gradient(180deg, #4a4a4a 0%, #3a3a3a 100%); border-color: #FFD700; }
        
        .game-message {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.95);
            color: #fff;
            padding: 15px 35px;
            border-radius: 4px;
            font-size: 16px;
            z-index: 1000;
            display: none;
            border: 2px solid #FFD700;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="game-message" id="game-message"></div>

    <div class="auth-container" id="auth-container">
        <div class="auth-box">
            <h1>🏛️ 远古</h1>
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="showAuthTab('login')">登录</button>
                <button class="auth-tab" onclick="showAuthTab('register')">注册</button>
            </div>
            <form class="auth-form" id="login-form" onsubmit="handleLogin(event)">
                <input type="text" id="login-username" placeholder="用户名" required>
                <input type="password" id="login-password" placeholder="密码" required>
                <button type="submit">登录</button>
            </form>
            <form class="auth-form" id="register-form" style="display:none" onsubmit="handleRegister(event)">
                <input type="text" id="register-username" placeholder="用户名" required>
                <input type="password" id="register-password" placeholder="密码" required>
                <input type="email" id="register-email" placeholder="邮箱" required>
                <button type="submit">注册</button>
            </form>
        </div>
    </div>

    <div class="lobby-container" id="lobby-container">
        <div class="lobby-header">
            <h1>🏛️ 远古 - 游戏大厅</h1>
            <div class="user-info">
                <span id="current-username" style="color: #FFD700; font-size: 1.2em;">玩家</span>
                <button onclick="logout()">退出</button>
            </div>
        </div>
        <div class="game-modes">
            <div class="game-mode-card" onclick="showDifficultySelect()">
                <h3>🤖 人机对战</h3>
                <p>与AI进行对战，练习你的策略</p>
            </div>
            <div class="game-mode-card" onclick="showGameList()">
                <h3>👥 人人对战</h3>
                <p>加入其他玩家的对战房间</p>
            </div>
        </div>
        <div id="difficulty-select" style="display:none; background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%); border-radius: 8px; padding: 30px; margin-top: 30px; border: 2px solid #8B4513;">
            <h3 style="color: #FFD700; margin-bottom: 20px;">选择难度</h3>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
                <div class="game-mode-card" onclick="createGame(true, 'easy')">
                    <h3>🌱 简单</h3>
                    <p>适合新手，AI发展缓慢</p>
                </div>
                <div class="game-mode-card" onclick="createGame(true, 'medium')">
                    <h3>⚡ 中等</h3>
                    <p>平衡的挑战，AI正常发展</p>
                </div>
                <div class="game-mode-card" onclick="createGame(true, 'hard')">
                    <h3>🔥 困难</h3>
                    <p>高难度挑战，AI发展迅速</p>
                </div>
            </div>
        </div>
        <div id="game-list-section" style="display:none; background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%); border-radius: 8px; padding: 30px; margin-top: 30px; border: 2px solid #8B4513;">
            <h3 style="color: #FFD700; margin-bottom: 20px;">等待中的游戏</h3>
            <div id="game-list-items"></div>
        </div>
    </div>

    <div class="game-container" id="game-container">
        <canvas id="game-canvas" class="game-canvas"></canvas>
        
        <div class="resource-bar">
            <div class="resource-item">
                <span class="resource-icon">🪵</span>
                <span class="resource-value" id="resource-wood">0</span>
            </div>
            <div class="resource-item">
                <span class="resource-icon">🌾</span>
                <span class="resource-value" id="resource-food">0</span>
            </div>
            <div class="resource-item">
                <span class="resource-icon">💰</span>
                <span class="resource-value" id="resource-gold">0</span>
            </div>
            <div class="resource-item">
                <span class="resource-icon">🪨</span>
                <span class="resource-value" id="resource-stone">0</span>
            </div>
            <div class="resource-item">
                <span class="resource-icon">👥</span>
                <span class="resource-value" id="population">0/20</span>
            </div>
            <div class="resource-item">
                <span class="resource-icon">⏳</span>
                <span class="resource-value" id="age-display">封建时代</span>
            </div>
            <div class="resource-item">
                <button onclick="endGame()" style="background: #8B0000; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold;">结束游戏</button>
            </div>
        </div>
        
        <div class="bottom-panel">
            <div class="selection-panel" id="selection-panel">
                <h3>未选择</h3>
                <p>拖拽框选或点击选择单位</p>
            </div>
            <div class="command-panel" id="command-panel"></div>
            <div class="minimap-panel">
                <canvas id="minimap" width="200" height="150"></canvas>
                <span class="minimap-label">小地图</span>
                <button class="reset-zoom-btn" onclick="resetZoom()">恢复原始尺寸</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let currentGame = null;
        let selectedUnits = [];
        let isSelecting = false;
        let selectionStart = { x: 0, y: 0 };
        let buildMode = null;
        let gameCanvas, ctx, minimapCanvas, minimapCtx;
        let lastTime = 0;

        let camera = { x: 0, y: 0, zoom: 1 };
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let dragStartCameraX = 0;
        let dragStartCameraY = 0;

        let gameData = {
            resources: { wood: 3000, food: 2000, gold: 1000, stone: 800 },
            buildings: [],
            units: [],
            mapResources: [],
            animals: [],
            tradePosts: [],
            terrainFeatures: [],
            age: 1,
            autoGatherers: [],
            traders: [],
            towers: [],
            controlGroups: {},
            projectiles: [],
            attackEffects: [],
            smokeEffects: [],
            population: 0,
            populationCap: 20,
            difficulty: 'medium',
            aiSettings: {
                easy: {
                    maxUnits: 10,
                    productionInterval: 20000,
                    attackDelay: 60000,
                    resourceGatherRate: 0.7,
                    unitProductionRatio: { villager: 0.7, soldier: 0.3 }
                },
                medium: {
                    maxUnits: 15,
                    productionInterval: 15000,
                    attackDelay: 45000,
                    resourceGatherRate: 1.0,
                    unitProductionRatio: { villager: 0.5, soldier: 0.5 }
                },
                hard: {
                    maxUnits: 20,
                    productionInterval: 10000,
                    attackDelay: 30000,
                    resourceGatherRate: 1.3,
                    unitProductionRatio: { villager: 0.3, soldier: 0.7 }
                }
            }
        };

        const MAP_WIDTH = 3000;
        const MAP_HEIGHT = 3000;

        const ENTITY_TYPES = {
            town_center: { name: '城镇中心', health: 2000, size: 100, color: '#8B4513', produces: ['villager'], attack: 8, range: 150 },
            town_center_age2: { name: '城堡', health: 3000, size: 100, color: '#654321', produces: ['villager', 'soldier', 'archer'], attack: 12, range: 180 },
            town_center_age3: { name: '皇宫', health: 4000, size: 100, color: '#4a3520', produces: ['villager', 'knight', 'catapult'], attack: 15, range: 200 },
            barracks: { name: '兵营', health: 1000, size: 80, color: '#5a4a3a', produces: ['soldier', 'archer'] },
            siege_workshop: { name: '攻城器工厂', health: 800, size: 80, color: '#4a4a3a', produces: ['catapult'] },
            farm: { name: '农田', health: 500, size: 60, color: '#7a9a5a' },
            market: { name: '市场', health: 800, size: 80, color: '#6a5a4a', produces: ['trader'] },
            lumber_camp: { name: '木材厂', health: 400, size: 70, color: '#8B4513' },
            mill: { name: '磨坊', health: 400, size: 70, color: '#c9a66b' },
            mining_camp: { name: '矿厂', health: 400, size: 70, color: '#696969' },
            wall: { name: '围墙', health: 800, size: 50, color: '#808080' },
            watch_tower: { name: '箭塔', health: 600, attack: 10, range: 200, size: 60, color: '#5a4a3a' },
            castle_tower: { name: '炮楼', health: 1000, attack: 25, range: 280, size: 70, color: '#4a3a2a' },
            villager: { name: '村民', health: 100, attack: 5, speed: 2.5, size: 24, color: '#4169E1', population: 1, icon: '👨‍🌾' },
            soldier: { name: '士兵', health: 150, attack: 15, speed: 2.2, size: 28, color: '#4169E1', population: 1, icon: '⚔️' },
            knight: { name: '骑士', health: 200, attack: 25, speed: 3.5, size: 32, color: '#4169E1', population: 2, icon: '🏇' },
            archer: { name: '弓箭手', health: 120, attack: 20, speed: 2.0, range: 180, size: 26, color: '#4169E1', population: 1, icon: '🏹' },
            trader: { name: '商队', health: 80, attack: 0, speed: 1.8, size: 30, color: '#4169E1', population: 1, icon: '🛒' },
            catapult: { name: '投石车', health: 150, attack: 40, speed: 0.8, range: 250, size: 36, color: '#4169E1', population: 3, icon: '🗡️' }
        };

        const BUILD_COSTS = {
            barracks: { wood: 175 },
            siege_workshop: { wood: 200, stone: 100 },
            farm: { wood: 60 },
            market: { wood: 200, stone: 100 },
            lumber_camp: { wood: 100 },
            mill: { wood: 100 },
            mining_camp: { wood: 100 },
            wall: { stone: 10 },
            watch_tower: { wood: 150, stone: 50 },
            castle_tower: { wood: 200, stone: 100 }
        };

        const UNIT_COSTS = {
            villager: { food: 50 },
            soldier: { food: 60, gold: 20 },
            knight: { food: 80, gold: 60 },
            archer: { food: 50, gold: 40 },
            trader: { wood: 50, food: 50 },
            catapult: { wood: 200, gold: 200 }
        };

        const FORMATIONS = {
            line: { name: '横排', cols: 12, spacing: 40 },
            square: { name: '方阵', cols: 8, spacing: 35 },
            column: { name: '纵列', cols: 4, spacing: 45 },
            wedge: { name: '楔形', cols: 6, spacing: 40 }
        };

        let currentFormation = 'square';

        function showAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
        }

        function showAuthTabByName(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            const activeTab = document.querySelector(`.auth-tab[onclick*="${tab}"]`);
            if (activeTab) {
                activeTab.classList.add('active');
            }
            document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            try {
                const response = await fetch('/api/users/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `username=${username}&password=${password}`
                });
                if (response.ok) {
                    currentUser = await response.json();
                    showLobby();
                } else {
                    showMessage('登录失败，请检查用户名和密码');
                }
            } catch (error) {
                showMessage('登录失败: ' + error.message);
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('register-username').value;
            const password = document.getElementById('register-password').value;
            const email = document.getElementById('register-email').value;
            try {
                const response = await fetch('/api/users/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `username=${username}&password=${password}&email=${email}`
                });
                if (response.ok) {
                    currentUser = await response.json();
                    showLobby();
                } else {
                    showMessage('注册失败，用户名或邮箱已存在');
                }
            } catch (error) {
                showMessage('注册失败: ' + error.message);
            }
        }

        function showLobby() {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('lobby-container').style.display = 'block';
            document.getElementById('current-username').textContent = currentUser.username;
        }

        function logout() {
            currentUser = null;
            document.getElementById('auth-container').style.display = 'flex';
            document.getElementById('lobby-container').style.display = 'none';
        }

        async function createGame(isAI, difficulty = 'medium') {
            if (!currentUser) {
                showMessage('请先登录');
                return;
            }
            try {
                const response = await fetch('/api/games/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `userId=${currentUser.id}&isAI=${isAI}`
                });
                if (response.ok) {
                    currentGame = await response.json();
                    currentGame.difficulty = difficulty;
                    startGame();
                } else {
                    showMessage('创建游戏失败');
                }
            } catch (error) {
                showMessage('创建游戏失败: ' + error.message);
            }
        }

        async function showDifficultySelect() {
            document.getElementById('game-list-section').style.display = 'none';
            document.getElementById('difficulty-select').style.display = 'block';
        }

        async function showGameList() {
            document.getElementById('difficulty-select').style.display = 'none';
            const listSection = document.getElementById('game-list-section');
            listSection.style.display = listSection.style.display === 'none' ? 'block' : 'none';
            try {
                const response = await fetch('/api/games/waiting');

                const games = await response.json();
                const container = document.getElementById('game-list-items');
                if (games.length === 0) {
                    container.innerHTML = '<p style="color: #aaa;">暂无等待中的游戏</p>';
                } else {
                    container.innerHTML = games.map(game => `
                        <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #3a3a3a; margin: 8px 0; border-radius: 4px;">
                            <span style="font-size: 1.1em;">游戏 #${game.gameId.substring(0, 8)}</span>

        async function joinGame(gameId) {
            try {
                const response = await fetch('/api/games/join', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `userId=${currentUser.id}&gameId=${gameId}`
                });
                if (response.ok) {
                    currentGame = await response.json();
                    startGame();
                } else {
                    showMessage('加入游戏失败');
                }
            } catch (error) {
                showMessage('加入游戏失败: ' + error.message);
            }
        }

        function startGame() {
            document.getElementById('lobby-container').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            
            gameCanvas = document.getElementById('game-canvas');
            ctx = gameCanvas.getContext('2d');
            minimapCanvas = document.getElementById('minimap');
            minimapCtx = minimapCanvas.getContext('2d');
            
            // 先初始化数据，再调整画布大小
            initGameData();
            
            // 应用难度设置
            if (currentGame && currentGame.difficulty) {
                gameData.difficulty = currentGame.difficulty;
                showMessage(`游戏难度: ${currentGame.difficulty === 'easy' ? '简单' : currentGame.difficulty === 'medium' ? '中等' : '困难'}`);
            }
            
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            initInputHandlers();
            updateResourceDisplay();
            camera.x = 400 - gameCanvas.width / 2;
            camera.y = 400 - gameCanvas.height / 2;
            
            // 计算初始人口
            gameData.population = gameData.units.filter(u => u.playerColor === 'blue').reduce((total, unit) => {
                return total + (ENTITY_TYPES[unit.type].population || 1);
            }, 0);
            
            // 调试信息
            console.log('Game data initialized:', {
                buildings: gameData.buildings.length,
                units: gameData.units.length,
                resources: gameData.mapResources.length,
                canvas: { width: gameCanvas.width, height: gameCanvas.height },
                camera: camera,
                difficulty: gameData.difficulty
            });
            
            requestAnimationFrame(gameLoop);
            showMessage('游戏开始！拖拽框选单位，右键移动，中键拖动地图');
            showMessage(`人口: ${gameData.population}/${gameData.populationCap}`);
        }

        // 生产单位
        function produceUnit(unitType, buildingId) {
            const building = gameData.buildings.find(b => b.id === buildingId);
            if (!building) return;
            
            const unitInfo = ENTITY_TYPES[unitType];
            const cost = UNIT_COSTS[unitType];
            
            // 检查资源
            const canAfford = Object.entries(cost).every(([resource, amount]) => {
                return gameData.resources[resource] >= amount;
            });
            
            // 检查人口
            const unitPopulation = unitInfo.population || 1;
            const canAffordPopulation = gameData.population + unitPopulation <= gameData.populationCap;
            
            if (!canAfford) {
                showMessage('资源不足，无法生产单位');
                return;
            }
            
            if (!canAffordPopulation) {
                showMessage('人口已满，无法生产单位');
                return;
            }
            
            // 扣除资源
            Object.entries(cost).forEach(([resource, amount]) => {
                gameData.resources[resource] -= amount;
            });
            
            // 增加人口
            gameData.population += unitPopulation;
            
            // 创建单位
            const newUnit = {
                id: Date.now() + Math.random(),
                type: unitType,
                x: building.x + Math.random() * 30 - 15,
                y: building.y + Math.random() * 30 - 15,
                health: unitInfo.health,
                maxHealth: unitInfo.health,
                playerColor: building.playerColor,
                targetX: null,
                targetY: null,
                carrying: null,
                carryAmount: 0,
                attackTarget: null,
                lastAttackTime: 0
            };
            
            gameData.units.push(newUnit);
            // 播放训练音效
            playSound('train');
            showMessage(`${unitInfo.name}生产完成！`);
            updateResourceDisplay();
        }

        function initInputHandlers() {
            gameCanvas.addEventListener('mousedown', handleMouseDown);
            gameCanvas.addEventListener('mousemove', handleMouseMove);
            gameCanvas.addEventListener('mouseup', handleMouseUp);
            gameCanvas.addEventListener('contextmenu', (e) => e.preventDefault());
            gameCanvas.addEventListener('wheel', handleWheel);
            minimapCanvas.addEventListener('click', handleMinimapClick);
            document.addEventListener('keydown', handleKeyDown);
        }

        let mousePos = { x: 0, y: 0 };

        function getWorldPos(clientX, clientY) {
            const rect = gameCanvas.getBoundingClientRect();
            return {
                x: ((clientX - rect.left) / camera.zoom) + camera.x,
                y: ((clientY - rect.top) / camera.zoom) + camera.y
            };
        }

        function handleMouseDown(e) {
            const worldPos = getWorldPos(e.clientX, e.clientY);
            mousePos = { x: e.clientX, y: e.clientY };
            
            if (e.button === 1) {
                isDragging = true;
                dragStart = { x: e.clientX, y: e.clientY };
                dragStartCameraX = camera.x;
                dragStartCameraY = camera.y;
            } else if (e.button === 0) {
                if (buildMode) {
                    placeBuilding(worldPos.x, worldPos.y);
                } else {
                    isSelecting = true;
                    selectionStart = { x: e.clientX, y: e.clientY };
                    
                    const clickedUnit = gameData.units.find(u => {
                        if (u.playerColor !== 'blue') return false;
                        const dist = Math.sqrt(Math.pow(u.x - worldPos.x, 2) + Math.pow(u.y - worldPos.y, 2));
                        return dist < ENTITY_TYPES[u.type].size;
                    });
                    
                    const clickedBuilding = gameData.buildings.find(b => {
                        if (b.playerColor !== 'blue') return false;
                        const dist = Math.sqrt(Math.pow(b.x - worldPos.x, 2) + Math.pow(b.y - worldPos.y, 2));
                        return dist < ENTITY_TYPES[b.type].size / 2;
                    });
                    
                    if (clickedUnit && !e.shiftKey) {
                        selectedUnits = [clickedUnit.id];
                    } else if (clickedUnit && e.shiftKey) {
                        if (!selectedUnits.includes(clickedUnit.id)) {
                            selectedUnits.push(clickedUnit.id);
                        } else {
                            selectedUnits = selectedUnits.filter(id => id !== clickedUnit.id);
                        }
                    } else if (clickedBuilding && !e.shiftKey) {
                        selectedUnits = [clickedBuilding.id];
                    } else if (clickedBuilding && e.shiftKey) {
                        if (!selectedUnits.includes(clickedBuilding.id)) {
                            selectedUnits.push(clickedBuilding.id);
                        } else {
                            selectedUnits = selectedUnits.filter(id => id !== clickedBuilding.id);
                        }
                    } else if (!e.shiftKey) {
                        selectedUnits = [];
                    }
                    updateSelection();
                }
            }
        }

        function handleMouseMove(e) {
            mousePos = { x: e.clientX, y: e.clientY };
            
            if (isDragging) {
                camera.x = (e.clientX - dragStart.x) / camera.zoom + dragStartCameraX;
                camera.y = (e.clientY - dragStart.y) / camera.zoom + dragStartCameraY;
                camera.x = Math.max(0, Math.min(camera.x, MAP_WIDTH - gameCanvas.width / camera.zoom));
                camera.y = Math.max(0, Math.min(camera.y, MAP_HEIGHT - gameCanvas.height / camera.zoom));
            }
        }

        function handleMouseUp(e) {
            if (e.button === 1) {
                isDragging = false;
            } else if (e.button === 0 && isSelecting) {
                isSelecting = false;
                const worldStart = getWorldPos(selectionStart.x, selectionStart.y);
                const worldEnd = getWorldPos(e.clientX, e.clientY);
                
                const minX = Math.min(worldStart.x, worldEnd.x);
                const maxX = Math.max(worldStart.x, worldEnd.x);
                const minY = Math.min(worldStart.y, worldEnd.y);
                const maxY = Math.max(worldStart.y, worldEnd.y);
                
                if (maxX - minX > 10 || maxY - minY > 10) {
                    if (!e.shiftKey) selectedUnits = [];
                    gameData.units.forEach(unit => {
                        if (unit.playerColor === 'blue' &&
                            unit.x >= minX && unit.x <= maxX &&
                            unit.y >= minY && unit.y <= maxY) {
                            if (!selectedUnits.includes(unit.id)) {
                                selectedUnits.push(unit.id);
                            }
                        }
                    });
                    // 同时检查建筑
                    gameData.buildings.forEach(building => {
                        if (building.playerColor === 'blue' &&
                            building.x >= minX && building.x <= maxX &&
                            building.y >= minY && building.y <= maxY) {
                            if (!selectedUnits.includes(building.id)) {
                                selectedUnits.push(building.id);
                            }
                        }
                    });
                    updateSelection();
                }
            } else if (e.button === 2) {
                if (buildMode) {
                    buildMode = null;
                } else if (selectedUnits.length > 0) {
                    const worldPos = getWorldPos(e.clientX, e.clientY);
                    
                    const clickedEnemy = gameData.units.find(u => {
                        if (u.playerColor !== 'red') return false;
                        const dist = Math.sqrt(Math.pow(u.x - worldPos.x, 2) + Math.pow(u.y - worldPos.y, 2));
                        return dist < ENTITY_TYPES[u.type].size + 10;
                    });
                    
                    const clickedEnemyBuilding = gameData.buildings.find(b => {
                        if (b.playerColor !== 'red') return false;
                        const dist = Math.sqrt(Math.pow(b.x - worldPos.x, 2) + Math.pow(b.y - worldPos.y, 2));
                        return dist < ENTITY_TYPES[b.type].size / 2 + 10;
                    });
                    
                    if (clickedEnemy || clickedEnemyBuilding) {
                        const target = clickedEnemy || clickedEnemyBuilding;
                        const targetType = clickedEnemy ? 'unit' : 'building';
                        
                        selectedUnits.forEach(unitId => {
                            const unit = gameData.units.find(u => u.id === unitId && u.playerColor === 'blue');
                            if (unit && unit.type !== 'villager' && unit.type !== 'trader') {
                                unit.attackTarget = { id: target.id, type: targetType };
                                unit.patrolPath = null;
                                unit.patrolIndex = 0;
                            }
                        });
                        
                        // 播放命令响应音效
                        playSound('command');
                        showMessage(`${selectedUnits.length}个单位正在攻击！`);
                    } else {
                        // 检查是否是巡逻模式（Shift+右键）
                        if (e.shiftKey) {
                            // 巡逻模式：攻击路径上的敌人
                            selectedUnits.forEach(unitId => {
                                const unit = gameData.units.find(u => u.id === unitId && u.playerColor === 'blue');
                                if (unit && unit.type !== 'villager' && unit.type !== 'trader') {
                                    unit.attackTarget = null;
                                    if (!unit.patrolPath) {
                                        unit.patrolPath = [];
                                    }
                                    unit.patrolPath.push({x: worldPos.x, y: worldPos.y});
                                    unit.patrolIndex = 0;
                                    unit.state = 'patrolling';
                                }
                            });
                            // 播放命令响应音效
                            playSound('command');
                            showMessage(`${selectedUnits.length}个单位开始巡逻！`);
                        } else {
                            // 普通移动：忽略路上敌人，到达后攻击附近敌人
                            selectedUnits.forEach(unitId => {
                                const unit = gameData.units.find(u => u.id === unitId);
                                if (unit) {
                                    unit.attackTarget = null;
                                    unit.patrolPath = null;
                                    unit.patrolIndex = 0;
                                    unit.state = 'moving';
                                }
                            });
                            // 播放命令响应音效
                            playSound('command');
                            moveUnits(worldPos.x, worldPos.y);
                        }
                    }
                }
            }
        }

        function handleWheel(e) {
            e.preventDefault();
            const zoomSpeed = 0.1;
            if (e.deltaY < 0) {
                camera.zoom = Math.min(camera.zoom + zoomSpeed, 2);
            } else {
                camera.zoom = Math.max(camera.zoom - zoomSpeed, 0.5);
            }
        }

        function handleKeyDown(e) {
            if (e.key >= '1' && e.key <= '9') {
                const groupNum = parseInt(e.key);
                if (e.ctrlKey) {
                    if (selectedUnits.length > 0) {
                        gameData.controlGroups[groupNum] = [...selectedUnits];
                        showMessage(`编队 ${groupNum} 已保存`);
                    }
                } else {
                    if (gameData.controlGroups[groupNum]) {
                        selectedUnits = [...gameData.controlGroups[groupNum]];
                        updateSelection();
                        showMessage(`选中编队 ${groupNum}`);
                    }
                }
            }
        }

        function moveUnits(targetX, targetY) {
            const formation = FORMATIONS[currentFormation];
            const units = selectedUnits.map(id => gameData.units.find(u => u.id === id)).filter(u => u && u.playerColor === 'blue');
            
            units.forEach((unit, index) => {
                let offsetX, offsetY;
                
                if (currentFormation === 'wedge') {
                    const row = Math.floor(Math.sqrt(index * 2));
                    const posInRow = index - row * (row + 1) / 2;
                    offsetX = (posInRow - row / 2) * formation.spacing;
                    offsetY = row * formation.spacing * 0.7;
                } else {
                    const col = index % formation.cols;
                    const row = Math.floor(index / formation.cols);
                    offsetX = col * formation.spacing - ((formation.cols - 1) * formation.spacing) / 2;
                    offsetY = row * formation.spacing - (Math.ceil(units.length / formation.cols) - 1) * formation.spacing / 2;
                }
                
                unit.targetX = targetX + offsetX;
                unit.targetY = targetY + offsetY;
            });
            
            showMessage(`${units.length}个单位移动中！阵型: ${formation.name}`);
        }

            const hasTownCenter = selectedBuildings.some(b => b.type.includes('town_center'));

        function startBuildMode(buildingType) {
            const cost = BUILD_COSTS[buildingType];
            for (const [resource, amount] of Object.entries(cost)) {
                if (gameData.resources[resource] < amount) {
                    showMessage('资源不足！');
                    return;
                }
            }
            buildMode = buildingType;
            selectedUnits = [];
            updateSelection();
            showMessage('点击地图放置建筑，右键取消');
        }

        function checkBuildingCollision(x, y, size) {
            for (const building of gameData.buildings) {
                const otherSize = ENTITY_TYPES[building.type].size;
                const minDistance = (size + otherSize) / 2 + 15;
                if (Math.abs(x - building.x) < minDistance &&
                    Math.abs(y - building.y) < minDistance) {
                    return true;
                }
            }
            return false;
        }

        function placeBuilding(x, y) {
            const buildingSize = ENTITY_TYPES[buildMode].size;
            if (checkBuildingCollision(x, y, buildingSize)) {
                showMessage('此位置已有建筑！请换个位置');
                return;
            }
            const cost = BUILD_COSTS[buildMode];
            for (const [resource, amount] of Object.entries(cost)) {
                gameData.resources[resource] -= amount;
            }
            const newBuilding = {
                id: Date.now(),
                type: buildMode,
                x: x,
                y: y,
                health: ENTITY_TYPES[buildMode].health,
                maxHealth: ENTITY_TYPES[buildMode].health,
                playerColor: 'blue'
            };
            gameData.buildings.push(newBuilding);
            if (buildMode === 'watch_tower' || buildMode === 'castle_tower') {
                gameData.towers.push(newBuilding);
            }
            // 播放建造音效
            playSound('build');
            buildMode = null;
            updateResourceDisplay();
            showMessage(`${ENTITY_TYPES[buildMode || newBuilding.type].name}建造完成！`);
        }

        function createUnit(type) {
            const producer = gameData.buildings.find(b => selectedUnits.includes(b.id));
            if (!producer) return;
            const cost = UNIT_COSTS[type];
            for (const [resource, amount] of Object.entries(cost)) {
                if (gameData.resources[resource] < amount) {
                    showMessage('资源不足！');
                    return;
                }
            }
            for (const [resource, amount] of Object.entries(cost)) {
                gameData.resources[resource] -= amount;
            }
            const newUnit = {
                id: Date.now(),
                type: type,
                x: producer.x + 100,
                y: producer.y,
                health: ENTITY_TYPES[type].health,
                maxHealth: ENTITY_TYPES[type].health,
                playerColor: 'blue',
                targetX: null,
                targetY: null,
                carrying: null,
                carryAmount: 0,
                attackTarget: null,
                lastAttackTime: 0
            };
            gameData.units.push(newUnit);
            updateResourceDisplay();
            showMessage(`${ENTITY_TYPES[type].name}生产完成！`);
        }

        function upgradeTownCenter() {
            if (gameData.age === 1) {
                if (gameData.resources.wood >= 500 && gameData.resources.food >= 500 && gameData.resources.gold >= 200) {
                    gameData.resources.wood -= 500;
                    gameData.resources.food -= 500;
                    gameData.resources.gold -= 200;
                    const tc = gameData.buildings.find(b => b.type === 'town_center' && b.playerColor === 'blue');
                    if (tc) {
                        tc.type = 'town_center_age2';
                        tc.health = 3000;
                        tc.maxHealth = 3000;

                    gameData.age = 2;
                    showMessage('升级到城堡时代！解锁骑士、弓箭手和炮楼');

                    gameData.resources.wood -= 1000;
                    gameData.resources.food -= 1000;
                    gameData.resources.gold -= 500;
                    gameData.resources.stone -= 300;
                    const tc = gameData.buildings.find(b => b.type === 'town_center_age2' && b.playerColor === 'blue');

        function update(dt) {
            const now = Date.now();
            
            gameData.units.forEach(unit => {
                if (unit.attackTarget) {
                    let target;
                    if (unit.attackTarget.type === 'unit') {
                        target = gameData.units.find(u => u.id === unit.attackTarget.id);
                    } else {
                        target = gameData.buildings.find(b => b.id === unit.attackTarget.id);
                    }
                    
                    if (target) {
                        const unitInfo = ENTITY_TYPES[unit.type];
                        const attackRange = unitInfo.range || 50;
                        const distance = Math.sqrt(Math.pow(target.x - unit.x, 2) + Math.pow(target.y - unit.y, 2));
                        
                        if (distance > attackRange) {
                            unit.targetX = target.x;
                            unit.targetY = target.y;
                            
                            const dx = unit.targetX - unit.x;
                            const dy = unit.targetY - unit.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            
                            if (dist > 2) {
                                const speed = unitInfo.speed * 60;
                                unit.x += (dx / dist) * speed * dt;
                                unit.y += (dy / dist) * speed * dt;
                            }
                        } else {
                            unit.targetX = null;
                            unit.targetY = null;
                            
                            const attackCooldown = 1000;
                            if (now - unit.lastAttackTime > attackCooldown) {
                                unit.lastAttackTime = now;
                                
                                target.health -= unitInfo.attack;
                                
                                // 播放攻击音效
                                playSound('attack');
                                
                                gameData.attackEffects.push({
                                    x: target.x,
                                    y: target.y,
                                    type: unit.type === 'archer' ? 'arrow' : 'melee',
                                    time: now,
                                    duration: 300
                                });
                                
                                if (target.health <= 0) {
                                    if (unit.attackTarget.type === 'unit') {
                                        const index = gameData.units.findIndex(u => u.id === target.id);
                                        if (index > -1) {
                                            // 减少人口（如果是自己的单位）
                                            if (target.playerColor === 'blue') {
                                                const unitPopulation = ENTITY_TYPES[target.type].population || 1;
                                                gameData.population = Math.max(0, gameData.population - unitPopulation);
                                                updateResourceDisplay();
                                            }
                                            // 播放死亡音效
                                            playSound('die');
                                            gameData.units.splice(index, 1);
                                            showMessage('消灭了一个敌人！');
                                        }
                                    } else {
                                        const index = gameData.buildings.findIndex(b => b.id === target.id);
                                        if (index > -1) {
                                            // 播放拆房音效
                                            playSound('explosion');
                                            gameData.buildings.splice(index, 1);
                                            showMessage('摧毁了敌方建筑！');
                                        }
                                    }
                                    unit.attackTarget = null;
                                    
                                    // 攻击完成后继续巡逻或移动
                                    if (unit.patrolPath && unit.patrolPath.length > 0) {
                                        unit.state = 'patrolling';
                                    } else if (unit.targetX !== null && unit.targetY !== null) {
                                        unit.state = 'moving';
                                    }
                                }
                            }
                        }
                    } else {
                        unit.attackTarget = null;
                        
                        // 目标消失后继续巡逻或移动
                        if (unit.patrolPath && unit.patrolPath.length > 0) {
                            unit.state = 'patrolling';
                        } else if (unit.targetX !== null && unit.targetY !== null) {
                            unit.state = 'moving';
                        }
                    }
                } else if (unit.state === 'patrolling' && unit.patrolPath && unit.patrolPath.length > 0) {
                    // 巡逻模式
                    const currentWaypoint = unit.patrolPath[unit.patrolIndex];
                    const distance = Math.sqrt(Math.pow(currentWaypoint.x - unit.x, 2) + Math.pow(currentWaypoint.y - unit.y, 2));
                    
                    if (distance > 2) {
                        // 移动到当前巡逻点
                        const dx = currentWaypoint.x - unit.x;
                        const dy = currentWaypoint.y - unit.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const speed = ENTITY_TYPES[unit.type].speed * 60;
                        unit.x += (dx / dist) * speed * dt;
                        unit.y += (dy / dist) * speed * dt;
                        
                        // 检查路径上的敌人
                        const enemies = gameData.units.filter(u => u.playerColor !== unit.playerColor && u.type !== 'villager' && u.type !== 'trader');
                        let closestEnemy = null;
                        let closestDistance = Infinity;
                        
                        enemies.forEach(enemy => {
                            const enemyDistance = Math.sqrt(Math.pow(enemy.x - unit.x, 2) + Math.pow(enemy.y - unit.y, 2));
                            if (enemyDistance < closestDistance && enemyDistance < 150) { // 150像素范围内的敌人
                                closestDistance = enemyDistance;
                                closestEnemy = enemy;
                            }
                        });
                        
                        if (closestEnemy) {
                            // 发现敌人，开始攻击
                            unit.attackTarget = { id: closestEnemy.id, type: 'unit' };
                            unit.state = 'attacking';
                        }
                    } else {
                        // 到达当前巡逻点，移动到下一个
                        unit.patrolIndex = (unit.patrolIndex + 1) % unit.patrolPath.length;
                    }
                } else if (unit.state === 'moving' && unit.targetX !== null && unit.targetY !== null) {
                    // 普通移动模式
                    const dx = unit.targetX - unit.x;
                    const dy = unit.targetY - unit.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist > 2) {
                        const speed = ENTITY_TYPES[unit.type].speed * 60;
                        unit.x += (dx / dist) * speed * dt;
                        unit.y += (dy / dist) * speed * dt;
                    } else {
                        // 到达目标点，检查附近敌人
                        unit.targetX = null;
                        unit.targetY = null;
                        unit.state = 'idle';
                        
                        // 检查周围敌人
                        const enemies = gameData.units.filter(u => u.playerColor !== unit.playerColor && u.type !== 'villager' && u.type !== 'trader');
                        let closestEnemy = null;
                        let closestDistance = Infinity;
                        
                        enemies.forEach(enemy => {
                            const enemyDistance = Math.sqrt(Math.pow(enemy.x - unit.x, 2) + Math.pow(enemy.y - unit.y, 2));
                            if (enemyDistance < closestDistance && enemyDistance < 100) { // 100像素范围内的敌人
                                closestDistance = enemyDistance;
                                closestEnemy = enemy;
                            }
                        });
                        
                        if (closestEnemy) {
                            // 发现附近敌人，开始攻击
                            unit.attackTarget = { id: closestEnemy.id, type: 'unit' };
                            unit.state = 'attacking';
                        }
                    }
                } else if (unit.targetX !== null && unit.targetY !== null) {
                    // 传统移动（兼容旧代码）
                    const dx = unit.targetX - unit.x;
                    const dy = unit.targetY - unit.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist > 2) {
                        const speed = ENTITY_TYPES[unit.type].speed * 60;
                        unit.x += (dx / dist) * speed * dt;
                        unit.y += (dy / dist) * speed * dt;
                    } else {
                        unit.targetX = null;
                        unit.targetY = null;
                    }
                }
            });
            
            // 箭塔自动攻击
            gameData.towers.forEach(tower => {
                if (tower.playerColor !== 'blue') return;
                const towerInfo = ENTITY_TYPES[tower.type];
                const enemies = gameData.units.filter(u => u.playerColor === 'red');
                enemies.forEach(enemy => {
                    const distance = Math.sqrt(Math.pow(enemy.x - tower.x, 2) + Math.pow(enemy.y - tower.y, 2));
                    if (distance <= towerInfo.range) {
                        enemy.health -= towerInfo.attack * dt;
                        if (enemy.health <= 0) {
                            const index = gameData.units.findIndex(u => u.id === enemy.id);
                            if (index > -1) {
                                gameData.units.splice(index, 1);
                                showMessage('箭塔消灭了一个敌人！');
                            }
                        }
                    }
                });
            });
            
            // 城镇中心自动攻击
            gameData.buildings.forEach(building => {
                if (building.playerColor !== 'blue' || !building.type.includes('town_center')) return;
                const buildingInfo = ENTITY_TYPES[building.type];
                if (!buildingInfo.attack || !buildingInfo.range) return;
                
                const enemies = gameData.units.filter(u => u.playerColor === 'red');
                enemies.forEach(enemy => {
                    const distance = Math.sqrt(Math.pow(enemy.x - building.x, 2) + Math.pow(enemy.y - building.y, 2));
                    if (distance <= buildingInfo.range) {
                        enemy.health -= buildingInfo.attack * dt;
                        
                        // 播放攻击音效
                        playSound('attack');
                        
                        // 添加攻击效果
                        gameData.attackEffects.push({
                            x: enemy.x,
                            y: enemy.y,
                            type: 'arrow',
                            time: now,
                            duration: 300
                        });
                        
                        if (enemy.health <= 0) {
                            const index = gameData.units.findIndex(u => u.id === enemy.id);
                            if (index > -1) {
                                gameData.units.splice(index, 1);
                                showMessage('城镇中心消灭了一个敌人！');
                            }
                        }
                    }
                });
            });
            
            // 敌方AI逻辑
            updateEnemyAI(now, dt);
            
            gameData.attackEffects = gameData.attackEffects.filter(effect => {
                return now - effect.time < effect.duration;
            });
            
            // 动物移动逻辑
            gameData.animals.forEach(animal => {
                if (now - animal.lastMoveTime > 3000 + Math.random() * 5000) {
                    // 随机移动
                    const moveRadius = 50;
                    animal.targetX = animal.x + (Math.random() * moveRadius * 2 - moveRadius);
                    animal.targetY = animal.y + (Math.random() * moveRadius * 2 - moveRadius);
                    animal.lastMoveTime = now;
                    
                    // 随机播放动物叫声
                    if (Math.random() > 0.7) {
                        if (animal.type === 'sheep') {
                            playSound('sheep');
                        } else if (animal.type === 'deer') {
                            playSound('deer');
                        } else if (animal.type === 'boar') {
                            playSound('boar');
                        }
                    }
                }
                
                if (animal.targetX !== null && animal.targetY !== null) {
                    const dx = animal.targetX - animal.x;
                    const dy = animal.targetY - animal.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist > 2) {
                        const speed = animal.moveSpeed * 60;
                        animal.x += (dx / dist) * speed * dt;
                        animal.y += (dy / dist) * speed * dt;
                    } else {
                        animal.targetX = null;
                        animal.targetY = null;
                    }
                }
            });
            
            // 城镇中心炊烟效果
            gameData.buildings.forEach(building => {
                if (building.type.includes('town_center') && now % 2000 < 100) {
                    gameData.smokeEffects.push({
                        x: building.x + Math.random() * 40 - 20,
                        y: building.y - building.size / 2 - 20,
                        time: now,
                        duration: 3000,
                        size: 10 + Math.random() * 10
                    });
                }
            });
            
            // 更新炊烟效果
            gameData.smokeEffects = gameData.smokeEffects.filter(effect => {
                return now - effect.time < effect.duration;
            });
            
            // 农民采集逻辑
            updateVillagers(now, dt);
            
            // 商队贸易逻辑
            updateTraders(now, dt);
        }

        // 农民采集更新
        function updateVillagers(now, dt) {
            const villagers = gameData.units.filter(u => u.type === 'villager');
            
            villagers.forEach(villager => {
                // 如果正在攻击或移动到攻击目标，不采集
                if (villager.attackTarget) return;
                
                // 农民状态：idle, gathering, delivering, hunting
                if (!villager.state) {
                    villager.state = 'idle';
                }
                
                if (villager.state === 'idle') {
                    // 寻找附近的资源
                    const nearbyResources = gameData.mapResources.filter(resource => {
                        if (resource.amount <= 0) return false;
                        const distance = Math.sqrt(Math.pow(resource.x - villager.x, 2) + Math.pow(resource.y - villager.y, 2));
                        return distance < 500; // 500像素范围内的资源
                    });
                    
                    // 寻找附近的羊群
                    const nearbyAnimals = gameData.animals.filter(animal => {
                        const distance = Math.sqrt(Math.pow(animal.x - villager.x, 2) + Math.pow(animal.y - villager.y, 2));
                        return distance < 300; // 300像素范围内的动物
                    });
                    
                    // 优先采集资源，然后狩猎
                    if (nearbyResources.length > 0) {
                        // 找到最近的资源
                        let closestResource = null;
                        let closestDistance = Infinity;
                        
                        nearbyResources.forEach(resource => {
                            const distance = Math.sqrt(Math.pow(resource.x - villager.x, 2) + Math.pow(resource.y - villager.y, 2));
                            if (distance < closestDistance) {
                                closestDistance = distance;
                                closestResource = resource;
                            }
                        });
                        
                        if (closestResource) {
                            villager.targetX = closestResource.x;
                            villager.targetY = closestResource.y;
                            villager.targetResource = closestResource;
                            villager.state = 'moving_to_resource';
                        }
                    } else if (nearbyAnimals.length > 0) {
                        // 找到最近的动物
                        let closestAnimal = null;
                        let closestDistance = Infinity;
                        
                        nearbyAnimals.forEach(animal => {
                            const distance = Math.sqrt(Math.pow(animal.x - villager.x, 2) + Math.pow(animal.y - villager.y, 2));
                            if (distance < closestDistance) {
                                closestDistance = distance;
                                closestAnimal = animal;
                            }
                        });
                        
                        if (closestAnimal) {
                            villager.targetX = closestAnimal.x;
                            villager.targetY = closestAnimal.y;
                            villager.targetAnimal = closestAnimal;
                            villager.state = 'hunting';
                        }
                    }
                    
                } else if (villager.state === 'moving_to_resource') {
                    if (villager.targetResource && villager.targetResource.amount > 0) {
                        const distance = Math.sqrt(Math.pow(villager.targetResource.x - villager.x, 2) + Math.pow(villager.targetResource.y - villager.y, 2));
                        
                        if (distance > 20) {
                            // 向资源点移动
                            const dx = villager.targetResource.x - villager.x;
                            const dy = villager.targetResource.y - villager.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            const speed = ENTITY_TYPES[villager.type].speed * 60;
                            villager.x += (dx / dist) * speed * dt;
                            villager.y += (dy / dist) * speed * dt;
                        } else {
                            // 到达资源点，开始采集
                            villager.targetX = null;
                            villager.targetY = null;
                            villager.state = 'gathering';
                            villager.gatherStartTime = now;
                        }
                    } else {
                        // 资源已耗尽，回到 idle 状态
                        villager.state = 'idle';
                        villager.targetResource = null;
                    }
                    
                } else if (villager.state === 'gathering') {
                    // 采集时间：2秒
                    if (now - villager.gatherStartTime > 2000) {
                        // 采集完成
                        const resourceType = villager.targetResource.type;
                        const gatherAmount = 10; // 每次采集10单位
                        
                        // 减少资源量
                        villager.targetResource.amount = Math.max(0, villager.targetResource.amount - gatherAmount);
                        
                        // 播放采集音效
                        let soundType = 'gather';
                        if (resourceType === 'wood') soundType = 'chop';
                        else if (resourceType === 'gold' || resourceType === 'stone') soundType = 'mine';
                        else if (resourceType === 'food') soundType = 'harvest';
                        playSound(soundType);
                        
                        // 农民携带资源
                        villager.carrying = resourceType;
                        villager.carryAmount = gatherAmount;
                        
                        // 寻找最近的交付点
                        const deliveryBuildings = gameData.buildings.filter(building => {
                            if (building.playerColor !== villager.playerColor) return false;
                            if (building.type === 'town_center' || building.type === 'town_center_age2' || building.type === 'town_center_age3') return true;
                            if (resourceType === 'wood' && (building.type === 'lumber_camp' || building.type === 'market')) return true;
                            if (resourceType === 'food' && (building.type === 'mill' || building.type === 'farm' || building.type === 'market')) return true;
                            if (resourceType === 'gold' && (building.type === 'mining_camp' || building.type === 'market')) return true;
                            if (resourceType === 'stone' && (building.type === 'mining_camp' || building.type === 'market')) return true;
                            return false;
                        });
                        
                        if (deliveryBuildings.length > 0) {
                            // 找到最近的交付点
                            let closestDelivery = null;
                            let closestDistance = Infinity;
                            
                            deliveryBuildings.forEach(building => {
                                const distance = Math.sqrt(Math.pow(building.x - villager.x, 2) + Math.pow(building.y - villager.y, 2));
                                if (distance < closestDistance) {
                                    closestDistance = distance;
                                    closestDelivery = building;
                                }
                            });
                            
                            if (closestDelivery) {
                                villager.targetX = closestDelivery.x;
                                villager.targetY = closestDelivery.y;
                                villager.targetDelivery = closestDelivery;
                                villager.state = 'delivering';
                            }
                        } else {
                            // 没有交付点，回到 idle 状态
                            villager.state = 'idle';
                            villager.carrying = null;
                            villager.carryAmount = 0;
                        }
                    }
                    
                } else if (villager.state === 'hunting') {
                    if (villager.targetAnimal) {
                        const distance = Math.sqrt(Math.pow(villager.targetAnimal.x - villager.x, 2) + Math.pow(villager.targetAnimal.y - villager.y, 2));
                        
                        if (distance > 15) {
                            // 向动物移动
                            const dx = villager.targetAnimal.x - villager.x;
                            const dy = villager.targetAnimal.y - villager.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            const speed = ENTITY_TYPES[villager.type].speed * 60;
                            villager.x += (dx / dist) * speed * dt;
                            villager.y += (dy / dist) * speed * dt;
                        } else {
                            // 到达动物，开始狩猎
                            villager.targetAnimal.health -= 5 * dt;
                            
                            if (villager.targetAnimal.health <= 0) {
                                // 狩猎完成，根据动物类型获得不同食物量
                                let gatherAmount = 15; // 默认15单位食物
                                if (villager.targetAnimal.type === 'deer') {
                                    gatherAmount = 20; // 鹿提供更多食物
                                } else if (villager.targetAnimal.type === 'boar') {
                                    gatherAmount = 25; // 野猪提供最多食物
                                }
                                
                                // 播放狩猎音效
                                playSound('hunt');
                                
                                // 农民携带资源
                                villager.carrying = 'food';
                                villager.carryAmount = gatherAmount;
                                
                                // 移除动物
                                const index = gameData.animals.findIndex(a => a.id === villager.targetAnimal.id);
                                if (index > -1) {
                                    gameData.animals.splice(index, 1);
                                }
                                
                                // 寻找最近的交付点
                                const deliveryBuildings = gameData.buildings.filter(building => {
                                    if (building.playerColor !== villager.playerColor) return false;
                                    if (building.type === 'town_center' || building.type === 'town_center_age2' || building.type === 'town_center_age3') return true;
                                    if (building.type === 'mill' || building.type === 'farm' || building.type === 'market') return true;
                                    return false;
                                });
                                
                                if (deliveryBuildings.length > 0) {
                                    // 找到最近的交付点
                                    let closestDelivery = null;
                                    let closestDistance = Infinity;
                                    
                                    deliveryBuildings.forEach(building => {
                                        const distance = Math.sqrt(Math.pow(building.x - villager.x, 2) + Math.pow(building.y - villager.y, 2));
                                        if (distance < closestDistance) {
                                            closestDistance = distance;
                                            closestDelivery = building;
                                        }
                                    });
                                    
                                    if (closestDelivery) {
                                        villager.targetX = closestDelivery.x;
                                        villager.targetY = closestDelivery.y;
                                        villager.targetDelivery = closestDelivery;
                                        villager.state = 'delivering';
                                    }
                                } else {
                                    // 没有交付点，回到 idle 状态
                                    villager.state = 'idle';
                                    villager.carrying = null;
                                    villager.carryAmount = 0;
                                }
                            }
                        }
                    } else {
                        // 动物不存在，回到 idle 状态
                        villager.state = 'idle';
                        villager.targetAnimal = null;
                    }
                    
                } else if (villager.state === 'delivering') {
                    if (villager.targetDelivery) {
                        const distance = Math.sqrt(Math.pow(villager.targetDelivery.x - villager.x, 2) + Math.pow(villager.targetDelivery.y - villager.y, 2));
                        
                        if (distance > 30) {
                            // 向交付点移动
                            const dx = villager.targetDelivery.x - villager.x;
                            const dy = villager.targetDelivery.y - villager.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            const speed = ENTITY_TYPES[villager.type].speed * 60;
                            villager.x += (dx / dist) * speed * dt;
                            villager.y += (dy / dist) * speed * dt;
                        } else {
                            // 到达交付点，交付资源
                            gameData.resources[villager.carrying] += villager.carryAmount;
                            
                            // 更新资源显示
                            updateResourceDisplay();
                            
                            // 重置状态
                            villager.carrying = null;
                            villager.carryAmount = 0;
                            villager.targetX = null;
                            villager.targetY = null;
                            villager.targetDelivery = null;
                            villager.state = 'idle';
                        }
                    } else {
                        // 交付点不存在，回到 idle 状态
                        villager.state = 'idle';
                        villager.carrying = null;
                        villager.carryAmount = 0;
                    }
                }
            });
        }

        // 敌方AI更新
        function updateEnemyAI(now, dt) {
            const enemyUnits = gameData.units.filter(u => u.playerColor === 'red' && u.type !== 'villager' && u.type !== 'trader');
            const enemyVillagers = gameData.units.filter(u => u.playerColor === 'red' && u.type === 'villager');
            const playerUnits = gameData.units.filter(u => u.playerColor === 'blue');
            const playerBuildings = gameData.buildings.filter(b => b.playerColor === 'blue');
            const enemyBuildings = gameData.buildings.filter(b => b.playerColor === 'red');
            
            // 获取当前难度设置
            const difficulty = gameData.difficulty || 'medium';
            const aiSettings = gameData.aiSettings[difficulty];
            
            // AI攻击范围检测
            const AI_DETECTION_RANGE = 400;
            const AI_ATTACK_RANGE = 50;
            
            // 敌方农民自动采集
            enemyVillagers.forEach(villager => {
                if (villager.attackTarget) return;
                
                if (!villager.state) {
                    villager.state = 'idle';
                }
                
                if (villager.state === 'idle') {
                    const nearbyResources = gameData.mapResources.filter(resource => {
                        if (resource.amount <= 0) return false;
                        const distance = Math.sqrt(Math.pow(resource.x - villager.x, 2) + Math.pow(resource.y - villager.y, 2));
                        return distance < 400;
                    });
                    
                    if (nearbyResources.length > 0) {
                        let closestResource = null;
                        let closestDistance = Infinity;
                        
                        nearbyResources.forEach(resource => {
                            const distance = Math.sqrt(Math.pow(resource.x - villager.x, 2) + Math.pow(resource.y - villager.y, 2));
                            if (distance < closestDistance) {
                                closestDistance = distance;
                                closestResource = resource;
                            }
                        });
                        
                        if (closestResource) {
                            villager.targetX = closestResource.x;
                            villager.targetY = closestResource.y;
                            villager.targetResource = closestResource;
                            villager.state = 'moving_to_resource';
                        }
                    }
                    
                } else if (villager.state === 'moving_to_resource') {
                    if (villager.targetResource && villager.targetResource.amount > 0) {
                        const distance = Math.sqrt(Math.pow(villager.targetResource.x - villager.x, 2) + Math.pow(villager.targetResource.y - villager.y, 2));
                        
                        if (distance < 20) {
                            villager.targetX = null;
                            villager.targetY = null;
                            villager.state = 'gathering';
                            villager.gatherStartTime = now;
                        }
                    } else {
                        villager.state = 'idle';
                        villager.targetResource = null;
                    }
                    
                } else if (villager.state === 'gathering') {
                    if (now - villager.gatherStartTime > 2000) {
                        const resourceType = villager.targetResource.type;
                        const gatherAmount = 8 * aiSettings.resourceGatherRate;
                        
                        villager.targetResource.amount = Math.max(0, villager.targetResource.amount - gatherAmount);
                        villager.carrying = resourceType;
