                        villager.carryAmount = gatherAmount;
                        
                        const deliveryBuildings = enemyBuildings.filter(building => {
                            if (building.type === 'town_center' || building.type === 'town_center_age2' || building.type === 'town_center_age3') return true;
                            if (resourceType === 'wood' && (building.type === 'lumber_camp' || building.type === 'market')) return true;
                            if (resourceType === 'food' && (building.type === 'mill' || building.type === 'farm' || building.type === 'market')) return true;
                            if (resourceType === 'gold' && (building.type === 'mining_camp' || building.type === 'market')) return true;
                            if (resourceType === 'stone' && (building.type === 'mining_camp' || building.type === 'market')) return true;
                            return false;
                        });
                        
                        if (deliveryBuildings.length > 0) {
                            let closestDelivery = null;
                            let closestDistance = Infinity;
                            
                            deliveryBuildings.forEach(building => {
                                const distance = Math.sqrt(Math.pow(building.x - villager.x, 2) + Math.pow(building.y - villager.y, 2));
                                if (distance < closestDistance) {
                                    closestDistance = distance;
                                    closestDelivery = building;
                                }
                            });
                            
                            if (closestDelivery) {
                                villager.targetX = closestDelivery.x;
                                villager.targetY = closestDelivery.y;
                                villager.targetDelivery = closestDelivery;
                                villager.state = 'delivering';
                            }
                        } else {
                            villager.state = 'idle';
                            villager.carrying = null;
                            villager.carryAmount = 0;
                        }
                    }
                    
                } else if (villager.state === 'delivering') {
                    if (villager.targetDelivery) {
                        const distance = Math.sqrt(Math.pow(villager.targetDelivery.x - villager.x, 2) + Math.pow(villager.targetDelivery.y - villager.y, 2));
                        
                        if (distance < 30) {
                            // 这里可以给敌方增加资源，但为了游戏平衡，暂时不增加
                            villager.carrying = null;
                            villager.carryAmount = 0;
                            villager.targetX = null;
                            villager.targetY = null;
                            villager.targetDelivery = null;
                            villager.state = 'idle';
                        }
                    } else {
                        villager.state = 'idle';
                        villager.carrying = null;
                        villager.carryAmount = 0;
                    }
                }
            });
            
            // 根据难度调整攻击单位数量
            const MAX_ATTACKING_UNITS = difficulty === 'easy' ? 2 : difficulty === 'medium' ? 3 : 4;
            let attackingUnits = 0;
            
            // 敌方军事单位攻击
            enemyUnits.forEach(enemy => {
                if (enemy.attackTarget) {
                    attackingUnits++;
                    let target;
                    if (enemy.attackTarget.type === 'unit') {
                        target = gameData.units.find(u => u.id === enemy.attackTarget.id);
                    } else {
                        target = gameData.buildings.find(b => b.id === enemy.attackTarget.id);
                    }
                    
                    if (!target || target.health <= 0) {
                        enemy.attackTarget = null;
                        return;
                    }
                    
                    const enemyInfo = ENTITY_TYPES[enemy.type];
                    const attackRange = enemyInfo.range || AI_ATTACK_RANGE;
                    const distance = Math.sqrt(Math.pow(target.x - enemy.x, 2) + Math.pow(target.y - enemy.y, 2));
                    
                    if (distance > attackRange) {
                        const dx = target.x - enemy.x;
                        const dy = target.y - enemy.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        
                        if (dist > 2) {
                            const speed = enemyInfo.speed * 60 * (difficulty === 'hard' ? 1.1 : 1.0); // 困难难度移动更快
                            enemy.x += (dx / dist) * speed * dt;
                            enemy.y += (dy / dist) * speed * dt;
                        }
                    } else {
                        const attackCooldown = difficulty === 'easy' ? 2000 : difficulty === 'medium' ? 1500 : 1000; // 困难难度攻击更快
                        if (now - enemy.lastAttackTime > attackCooldown) {
                            enemy.lastAttackTime = now;
                            const attackMultiplier = difficulty === 'easy' ? 0.6 : difficulty === 'medium' ? 0.8 : 1.0; // 困难难度攻击力更高
                            target.health -= enemyInfo.attack * attackMultiplier;
                            
                            // 播放攻击音效
                            playSound('attack');
                            
                            gameData.attackEffects.push({
                                x: target.x,
                                y: target.y,
                                type: enemy.type === 'archer' ? 'arrow' : 'melee',
                                time: now,
                                duration: 300
                            });
                            
                            if (target.health <= 0) {
                                    if (enemy.attackTarget.type === 'unit') {
                                        const index = gameData.units.findIndex(u => u.id === target.id);
                                        if (index > -1) {
                                            if (target.playerColor === 'blue') {
                                                const unitPopulation = ENTITY_TYPES[target.type].population || 1;
                                                gameData.population = Math.max(0, gameData.population - unitPopulation);
                                                updateResourceDisplay();
                                            }
                                            // 播放死亡音效
                                            playSound('die');
                                            gameData.units.splice(index, 1);
                                            showMessage('你的单位被消灭了！');
                                        }
                                    } else {
                                        const index = gameData.buildings.findIndex(b => b.id === target.id);
                                        if (index > -1) {
                                            // 播放拆房音效
                                            playSound('explosion');
                                            gameData.buildings.splice(index, 1);
                                            showMessage('你的建筑被摧毁了！');
                                        }
                                    }
                                    enemy.attackTarget = null;
                            }
                        }
                    }
                } else {
                    // 限制攻击单位数量
                    if (attackingUnits >= MAX_ATTACKING_UNITS) return;
                    
                    // 优先寻找附近的玩家单位
                    let closestTarget = null;
                    let closestDistance = AI_DETECTION_RANGE;
                    let targetType = 'unit';
                    
                    playerUnits.forEach(playerUnit => {
                        const distance = Math.sqrt(Math.pow(playerUnit.x - enemy.x, 2) + Math.pow(playerUnit.y - enemy.y, 2));
                        if (distance < closestDistance) {
                            closestDistance = distance;
                            closestTarget = playerUnit;
                            targetType = 'unit';
                        }
                    });
                    
                    // 如果没有找到单位，寻找建筑
                    if (!closestTarget) {
                        playerBuildings.forEach(building => {
                            const distance = Math.sqrt(Math.pow(building.x - enemy.x, 2) + Math.pow(building.y - enemy.y, 2));
                            if (distance < closestDistance) {
                                closestDistance = distance;
                                closestTarget = building;
                                targetType = 'building';
                            }
                        });
                    }
                    
                    // 如果找到目标，开始攻击
                    if (closestTarget) {
                        // 根据难度调整攻击概率
                        const attackProbability = difficulty === 'easy' ? 0.3 : difficulty === 'medium' ? 0.5 : 0.7;
                        if (Math.random() > (1 - attackProbability)) {
                            enemy.attackTarget = { id: closestTarget.id, type: targetType };
                            attackingUnits++;
                        }
                    } else {
                        // 没有找到目标，主动向玩家基地移动
                        if (!enemy.lastMoveTime) {
                            enemy.lastMoveTime = now;
                        }
                        
                        // 根据难度调整移动频率
                        const moveInterval = aiSettings.attackDelay;
                        if (now - enemy.lastMoveTime > moveInterval) {
                            enemy.lastMoveTime = now;
                            
                            // 寻找玩家的城镇中心或主要建筑
                            const playerTownCenter = playerBuildings.find(b => b.type.includes('town_center'));
                            if (playerTownCenter) {
                                // 向玩家城镇中心移动
                                enemy.targetX = playerTownCenter.x + Math.random() * 100 - 50;
                                enemy.targetY = playerTownCenter.y + Math.random() * 100 - 50;
                                enemy.state = 'moving_to_base';
                            } else if (playerBuildings.length > 0) {
                                // 向最近的玩家建筑移动
                                const nearestBuilding = playerBuildings.reduce((nearest, building) => {
                                    const distance = Math.sqrt(Math.pow(building.x - enemy.x, 2) + Math.pow(building.y - enemy.y, 2));
                                    if (!nearest || distance < nearest.distance) {
                                        return { building, distance };
                                    }
                                    return nearest;
                                }, null);
                                
                                if (nearestBuilding) {
                                    enemy.targetX = nearestBuilding.building.x + Math.random() * 80 - 40;
                                    enemy.targetY = nearestBuilding.building.y + Math.random() * 80 - 40;
                                    enemy.state = 'moving_to_base';
                                }
                            }
                        }
                        
                        // 执行移动
                        if (enemy.state === 'moving_to_base' && enemy.targetX !== null && enemy.targetY !== null) {
                            const distance = Math.sqrt(Math.pow(enemy.targetX - enemy.x, 2) + Math.pow(enemy.targetY - enemy.y, 2));
                            if (distance > 5) {
                                const dx = enemy.targetX - enemy.x;
                                const dy = enemy.targetY - enemy.y;
                                const dist = Math.sqrt(dx * dx + dy * dy);
                                const speed = ENTITY_TYPES[enemy.type].speed * 60 * (difficulty === 'hard' ? 1.1 : 0.9); // 困难难度移动更快
                                enemy.x += (dx / dist) * speed * dt;
                                enemy.y += (dy / dist) * speed * dt;
                            } else {
                                // 到达目标区域，重置状态
                                enemy.targetX = null;
                                enemy.targetY = null;
                                enemy.state = 'idle';
                            }
                        }
                    }
                }
            });
            
            // 敌方箭塔自动攻击
            gameData.towers.forEach(tower => {
                if (tower.playerColor !== 'red') return;
                const towerInfo = ENTITY_TYPES[tower.type];
                
                playerUnits.forEach(playerUnit => {
                    const distance = Math.sqrt(Math.pow(playerUnit.x - tower.x, 2) + Math.pow(playerUnit.y - tower.y, 2));
                    if (distance <= towerInfo.range) {
                        const attackMultiplier = difficulty === 'easy' ? 0.6 : difficulty === 'medium' ? 0.8 : 1.0;
                        playerUnit.health -= towerInfo.attack * attackMultiplier * dt;
                        
                        if (playerUnit.health <= 0) {
                            const index = gameData.units.findIndex(u => u.id === playerUnit.id);
                            if (index > -1) {
                                const unitPopulation = ENTITY_TYPES[playerUnit.type].population || 1;
                                gameData.population = Math.max(0, gameData.population - unitPopulation);
                                updateResourceDisplay();
                                gameData.units.splice(index, 1);
                                showMessage('敌方箭塔消灭了你的单位！');
                            }
                        }
                    }
                });
            });
            
            // 敌方AI生产单位
            const enemyTC = enemyBuildings.find(b => b.type === 'town_center' || b.type === 'town_center_age2' || b.type === 'town_center_age3');
            if (enemyTC) {
                // 限制敌方单位数量
                const maxEnemyUnits = aiSettings.maxUnits;
                const currentEnemyUnits = gameData.units.filter(u => u.playerColor === 'red').length;
                
                if (currentEnemyUnits < maxEnemyUnits) {
                    // 根据难度调整生产间隔
                    if (!enemyTC.lastProductionTime) {
                        enemyTC.lastProductionTime = now;
                    }
                    
                    if (now - enemyTC.lastProductionTime > aiSettings.productionInterval) {
                        const availableUnits = ENTITY_TYPES[enemyTC.type].produces || [];
                        if (availableUnits.length > 0) {
                            // 根据难度调整单位生产比例
                            let unitType;
                            const rand = Math.random();
                            if (rand < aiSettings.unitProductionRatio.villager) {
                                unitType = availableUnits.find(u => u === 'villager') || availableUnits[0];
                            } else {
                                unitType = availableUnits.find(u => u === 'soldier' || u === 'archer') || availableUnits[0];
                            }
                            
                            // 生产单位
                            const newUnit = {
                                id: Date.now() + Math.random(),
                                type: unitType,
                                x: enemyTC.x + Math.random() * 40 - 20,
                                y: enemyTC.y + Math.random() * 40 - 20,
                                health: ENTITY_TYPES[unitType].health,
                                maxHealth: ENTITY_TYPES[unitType].health,
                                playerColor: 'red',
                                targetX: null,
                                targetY: null,
                                carrying: null,
                                carryAmount: 0,
                                attackTarget: null,
                                lastAttackTime: 0
                            };
                            
                            gameData.units.push(newUnit);
                            // 播放训练音效
                            playSound('train');
                            enemyTC.lastProductionTime = now;
                        }
                    }
                }
            }
        }

        function render() {
            ctx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);
            
            ctx.save();
            // 应用缩放
            ctx.scale(camera.zoom, camera.zoom);
            // 应用平移
            ctx.translate(-camera.x, -camera.y);
            
            drawTerrain();
            drawTerrainFeatures();
            drawTradePosts();
            drawResources();
            drawAnimals();
            drawBuildings();
            drawUnits();
            drawAttackEffects();
            drawSmokeEffects();
            drawSelection();
            if (buildMode) drawBuildPreview();
            
            ctx.restore();
        }

        function drawAttackEffects() {
            const now = Date.now();
            gameData.attackEffects.forEach(effect => {
                const progress = (now - effect.time) / effect.duration;
                const alpha = 1 - progress;
                
                if (effect.type === 'melee') {
                    ctx.strokeStyle = `rgba(255, 255, 0, ${alpha})`;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(effect.x, effect.y, 20 + progress * 20, 0, Math.PI * 2);
                    ctx.stroke();
                } else if (effect.type === 'arrow') {
                    ctx.fillStyle = `rgba(255, 100, 0, ${alpha})`;
                    ctx.beginPath();
                    ctx.arc(effect.x, effect.y, 10 * (1 - progress * 0.5), 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function drawTerrain() {
            ctx.fillStyle = '#4a8a5c';
            ctx.fillRect(0, 0, MAP_WIDTH, MAP_HEIGHT);
            
            ctx.strokeStyle = 'rgba(0,0,0,0.05)';
            ctx.lineWidth = 1;
            for (let x = 0; x < MAP_WIDTH; x += 50) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, MAP_HEIGHT);
                ctx.stroke();
            }
            for (let y = 0; y < MAP_HEIGHT; y += 50) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(MAP_WIDTH, y);
                ctx.stroke();
            }
            
            ctx.fillStyle = 'rgba(60, 120, 80, 0.3)';
            for (let i = 0; i < 200; i++) {
                const x = (i * 173) % MAP_WIDTH;
                const y = (i * 211) % MAP_HEIGHT;
                ctx.beginPath();
                ctx.arc(x, y, 15 + (i % 10), 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawResources() {
            gameData.mapResources.forEach(resource => {
                // 绘制阴影
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(resource.x + 3, resource.y + 3, 18, 8, 0, 0, Math.PI * 2);
                ctx.fill();
                
                if (resource.type === 'wood') {
                    // 树干（更逼真的形状）
                    ctx.fillStyle = '#8B4513';
                    ctx.beginPath();
                    ctx.ellipse(resource.x, resource.y - 5, 8, 12, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // 树皮纹理
                    ctx.strokeStyle = '#654321';
                    ctx.lineWidth = 1;
                    for (let i = -10; i <= 10; i += 3) {
                        ctx.beginPath();
                        const width = 12 - Math.abs(i) * 0.3;
                        ctx.ellipse(resource.x, resource.y + i, width/2, 1, 0, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                    // 树冠 - 多层效果
                    ctx.fillStyle = '#228B22';
                    ctx.beginPath();
                    ctx.arc(resource.x, resource.y - 35, 25, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#32CD32';
                    ctx.beginPath();
                    ctx.arc(resource.x - 10, resource.y - 30, 18, 0, Math.PI * 2);
                    ctx.arc(resource.x + 10, resource.y - 32, 16, 0, Math.PI * 2);
                    ctx.arc(resource.x, resource.y - 40, 14, 0, Math.PI * 2);
                    ctx.fill();
                    // 树叶细节
                    ctx.fillStyle = '#006400';
                    ctx.beginPath();
                    ctx.arc(resource.x - 5, resource.y - 45, 10, 0, Math.PI * 2);
                    ctx.arc(resource.x + 5, resource.y - 43, 9, 0, Math.PI * 2);
                    ctx.fill();
                    // 高光和细节
                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.beginPath();
                    ctx.arc(resource.x - 8, resource.y - 38, 6, 0, Math.PI * 2);
                    ctx.arc(resource.x + 5, resource.y - 40, 4, 0, Math.PI * 2);
                    ctx.fill();
                    // 地面阴影
                    ctx.fillStyle = 'rgba(0,0,0,0.2)';
                    ctx.beginPath();
                    ctx.ellipse(resource.x, resource.y + 8, 15, 5, 0, 0, Math.PI * 2);
                    ctx.fill();
                    
                } else if (resource.type === 'gold') {
                    // 金矿底座（更自然的形状）
                    ctx.fillStyle = '#8B7355';
                    ctx.beginPath();
                    ctx.ellipse(resource.x, resource.y + 8, 22, 12, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // 底座纹理
                    ctx.strokeStyle = '#654321';
                    ctx.lineWidth = 1;
                    for (let i = -10; i <= 10; i += 5) {
                        ctx.beginPath();
                        const width = 20 - Math.abs(i) * 0.4;
                        ctx.ellipse(resource.x, resource.y + i, width/2, 2, 0, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                    // 金块（更逼真的形状）
                    const goldPositions = [
                        {x: 0, y: -18, s: 14, r: 0.5},
                        {x: -14, y: -8, s: 12, r: -0.3},
                        {x: 14, y: -10, s: 13, r: 0.2},
                        {x: -8, y: 0, s: 10, r: -0.5},
                        {x: 10, y: 3, s: 11, r: 0.3}
                    ];
                    goldPositions.forEach(g => {
                        // 金块阴影
                        ctx.save();
                        ctx.translate(resource.x + g.x + 2, resource.y + g.y + 2);
                        ctx.rotate(g.r);
                        ctx.fillStyle = '#B8860B';
                        ctx.beginPath();
                        ctx.moveTo(0, g.s/2);
                        ctx.lineTo(g.s/2, 0);
                        ctx.lineTo(0, -g.s/2);
                        ctx.lineTo(-g.s/2, 0);
                        ctx.closePath();
                        ctx.fill();
                        ctx.restore();
                        // 金块本体
                        ctx.save();
                        ctx.translate(resource.x + g.x, resource.y + g.y);
                        ctx.rotate(g.r);
                        ctx.fillStyle = '#FFD700';
                        ctx.beginPath();
                        ctx.moveTo(0, g.s/2);
                        ctx.lineTo(g.s/2, 0);
                        ctx.lineTo(0, -g.s/2);
                        ctx.lineTo(-g.s/2, 0);
                        ctx.closePath();
                        ctx.fill();
                        // 金块高光
                        ctx.fillStyle = '#FFFFE0';
                        ctx.beginPath();
                        ctx.moveTo(0, g.s/3);
                        ctx.lineTo(g.s/3, 0);
                        ctx.lineTo(0, -g.s/3);
                        ctx.lineTo(-g.s/3, 0);
                        ctx.closePath();
                        ctx.fill();
                        ctx.restore();
                    });
                    // 闪光效果（多个位置）
                    const sparkles = [{x: -5, y: -15}, {x: 8, y: -12}, {x: -10, y: -5}];
                    sparkles.forEach(sparkle => {
                        ctx.fillStyle = 'rgba(255,255,200,0.7)';
                        ctx.beginPath();
                        ctx.arc(resource.x + sparkle.x, resource.y + sparkle.y, 3, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = 'rgba(255,255,255,0.9)';
                        ctx.beginPath();
                        ctx.arc(resource.x + sparkle.x - 1, resource.y + sparkle.y - 1, 1, 0, Math.PI * 2);
                        ctx.fill();
                    });
                    
                } else if (resource.type === 'stone') {
                    // 石头堆（更自然的布局）
                    const stones = [
                        {x: 0, y: -8, r: 16, c: '#808080', angle: 0},
                        {x: -14, y: 6, r: 12, c: '#696969', angle: -0.3},
                        {x: 14, y: 4, r: 13, c: '#787878', angle: 0.2},
                        {x: 0, y: 10, r: 11, c: '#606060', angle: 0.5},
                        {x: -8, y: -14, r: 10, c: '#707070', angle: -0.4}
                    ];
                    stones.forEach(s => {
                        // 石头阴影
                        ctx.save();
                        ctx.translate(resource.x + s.x + 3, resource.y + s.y + 3);
                        ctx.rotate(s.angle);
                        ctx.fillStyle = 'rgba(0,0,0,0.3)';
                        ctx.beginPath();
                        ctx.ellipse(0, 0, s.r, s.r * 0.8, 0, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                        // 石头本体（不规则形状）
                        ctx.save();
                        ctx.translate(resource.x + s.x, resource.y + s.y);
                        ctx.rotate(s.angle);
                        ctx.fillStyle = s.c;
                        ctx.beginPath();
                        ctx.moveTo(0, -s.r);
                        ctx.lineTo(s.r * 0.8, -s.r * 0.3);
                        ctx.lineTo(s.r * 0.6, s.r * 0.7);
                        ctx.lineTo(-s.r * 0.4, s.r * 0.9);
                        ctx.lineTo(-s.r * 0.9, s.r * 0.2);
                        ctx.lineTo(-s.r * 0.7, -s.r * 0.6);
                        ctx.closePath();
                        ctx.fill();
                        // 石头纹理
                        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(-s.r * 0.5, -s.r * 0.5);
                        ctx.lineTo(s.r * 0.5, s.r * 0.5);
                        ctx.moveTo(-s.r * 0.3, s.r * 0.3);
                        ctx.lineTo(s.r * 0.3, -s.r * 0.3);
                        ctx.stroke();
                        // 高光
                        ctx.fillStyle = 'rgba(255,255,255,0.2)';
                        ctx.beginPath();
                        ctx.ellipse(-s.r * 0.3, -s.r * 0.3, s.r * 0.3, s.r * 0.2, 0, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                    });
                    // 地面阴影
                    ctx.fillStyle = 'rgba(0,0,0,0.2)';
                    ctx.beginPath();
                    ctx.ellipse(resource.x, resource.y + 12, 20, 6, 0, 0, Math.PI * 2);
                    ctx.fill();
                    
                } else if (resource.type === 'food') {
                    // 浆果丛（更茂密的外观）
                    ctx.fillStyle = '#228B22';
                    ctx.beginPath();
                    ctx.ellipse(resource.x, resource.y + 8, 20, 12, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // 叶子层
                    ctx.fillStyle = '#32CD32';
                    const leafPositions = [
                        {x: 0, y: -5, r: 14},
                        {x: -8, y: 0, r: 12},
                        {x: 8, y: 2, r: 11},
                        {x: 0, y: 6, r: 10}
                    ];
                    leafPositions.forEach(leaf => {
                        ctx.beginPath();
                        ctx.ellipse(resource.x + leaf.x, resource.y + leaf.y, leaf.r, leaf.r * 0.8, Math.random() * Math.PI, 0, Math.PI * 2);
                        ctx.fill();
                    });
                    // 浆果（更多且更鲜艳）
                    const berries = [
                        {x: -10, y: -8, size: 5},
                        {x: 6, y: -10, size: 4},
                        {x: 12, y: -2, size: 5},
                        {x: -6, y: 7, size: 4},
                        {x: 10, y: 8, size: 4},
                        {x: 0, y: -12, size: 5},
                        {x: -12, y: 2, size: 4},
                        {x: 8, y: -5, size: 4}
                    ];
                    berries.forEach(b => {
                        // 浆果阴影
                        ctx.fillStyle = '#8B0000';
                        ctx.beginPath();
                        ctx.arc(resource.x + b.x + 1, resource.y + b.y + 1, b.size, 0, Math.PI * 2);
                        ctx.fill();
                        // 浆果本体
                        ctx.fillStyle = '#DC143C';
                        ctx.beginPath();
                        ctx.arc(resource.x + b.x, resource.y + b.y, b.size, 0, Math.PI * 2);
                        ctx.fill();
                        // 浆果高光
                        ctx.fillStyle = '#FF6347';
                        ctx.beginPath();
                        ctx.arc(resource.x + b.x - 1, resource.y + b.y - 1, b.size * 0.4, 0, Math.PI * 2);
                        ctx.fill();
                    });
                    // 地面阴影
                    ctx.fillStyle = 'rgba(0,0,0,0.2)';
                    ctx.beginPath();
                    ctx.ellipse(resource.x, resource.y + 12, 18, 6, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // 资源量指示
                if (resource.amount > 0) {
                    ctx.fillStyle = 'rgba(255,255,255,0.9)';
                    ctx.font = 'bold 11px Arial';
                    ctx.textAlign = 'center';
                    ctx.strokeStyle = 'black';
                    ctx.lineWidth = 2;
                    ctx.strokeText(resource.amount, resource.x, resource.y - 45);
                    ctx.fillText(resource.amount, resource.x, resource.y - 45);
                }
            });
        }



        function drawBuildings() {
            gameData.buildings.forEach(building => {
                const typeInfo = ENTITY_TYPES[building.type];
                const size = typeInfo.size;
                const x = building.x - size / 2;
                const y = building.y - size / 2;
                const isEnemy = building.playerColor === 'red';
                
                // 建筑阴影 - 更真实的阴影
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.beginPath();
                ctx.ellipse(building.x, building.y + size * 0.6, size * 0.8, size * 0.2, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // 建筑底色
                const baseColor = isEnemy ? '#8B0000' : '#8B4513';
                ctx.fillStyle = baseColor;
                
                // 根据建筑类型绘制不同的形状
                if (building.type.includes('town_center')) {
                    // 城镇中心 - 城堡形状
                    ctx.beginPath();
                    // 底部矩形
                    ctx.fillRect(x, y + size * 0.3, size, size * 0.7);
                    // 顶部塔楼
                    ctx.fillRect(x + size * 0.3, y, size * 0.4, size * 0.5);
                    // 塔顶
                    ctx.beginPath();
                    ctx.moveTo(x + size * 0.25, y + size * 0.5);
                    ctx.lineTo(x + size * 0.5, y);
                    ctx.lineTo(x + size * 0.75, y + size * 0.5);
                    ctx.closePath();
                    ctx.fill();
                } else if (building.type === 'barracks') {
                    // 兵营 - 矩形带屋顶
                    ctx.fillRect(x, y + size * 0.2, size, size * 0.8);
                    // 屋顶
                    ctx.beginPath();
                    ctx.moveTo(x - size * 0.1, y + size * 0.2);
                    ctx.lineTo(x + size * 0.5, y - size * 0.1);
                    ctx.lineTo(x + size * 1.1, y + size * 0.2);
                    ctx.closePath();
                    ctx.fill();
                } else if (building.type === 'farm') {
                    // 农场 - 田地形状
                    ctx.fillStyle = '#7a9a5a';
                    ctx.fillRect(x, y, size, size);
                    // 田埂
                    ctx.strokeStyle = '#5a7a3a';
                    ctx.lineWidth = 2;
                    for (let i = 1; i < 4; i++) {
                        ctx.beginPath();
                        ctx.moveTo(x, y + size * i / 4);
                        ctx.lineTo(x + size, y + size * i / 4);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(x + size * i / 4, y);
                        ctx.lineTo(x + size * i / 4, y + size);
                        ctx.stroke();
                    }
                } else if (building.type === 'market') {
                    // 市场 - 圆形建筑
                    ctx.beginPath();
                    ctx.arc(building.x, building.y, size * 0.4, 0, Math.PI * 2);
                    ctx.fill();
                    // 屋顶
                    ctx.fillStyle = '#654321';
                    ctx.beginPath();
                    ctx.arc(building.x, building.y, size * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                } else if (building.type === 'watch_tower' || building.type === 'castle_tower') {
                    // 箭塔/城堡 - 高塔
                    ctx.fillRect(x + size * 0.3, y, size * 0.4, size);
                    // 塔顶
                    ctx.fillStyle = '#654321';
                    ctx.beginPath();
                    ctx.moveTo(x + size * 0.2, y);
                    ctx.lineTo(x + size * 0.5, y - size * 0.2);
                    ctx.lineTo(x + size * 0.8, y);
                    ctx.closePath();
                    ctx.fill();
                    // 箭窗
                    ctx.fillStyle = '#000';
                    for (let i = 0; i < 3; i++) {
                        ctx.fillRect(x + size * 0.35, y + size * 0.3 + i * size * 0.2, size * 0.3, size * 0.1);
                    }
                } else if (building.type === 'wall') {
                    // 围墙 - 城墙形状
                    ctx.fillRect(x, y + size * 0.3, size, size * 0.7);
                    // 城垛
                    for (let i = 0; i < 5; i++) {
                        ctx.fillRect(x + i * size / 5, y, size / 6, size * 0.3);
                    }
                } else {
                    // 其他建筑 - 基础矩形
                    ctx.fillRect(x, y, size, size);
                }
                
                // 建筑纹理 - 更细致的砖块效果
                ctx.strokeStyle = isEnemy ? '#5a0000' : '#654321';
                ctx.lineWidth = 1;
                for (let i = 0; i < size; i += 12) {
                    ctx.beginPath();
                    ctx.moveTo(x + i, y);
                    ctx.lineTo(x + i, y + size);
                    ctx.stroke();
                }
                for (let i = 0; i < size; i += 8) {
                    ctx.beginPath();
                    ctx.moveTo(x, y + i);
                    ctx.lineTo(x + size, y + i);
                    ctx.stroke();
                }
                
                // 建筑边框
                ctx.strokeStyle = isEnemy ? '#DC143C' : '#D2691E';
                ctx.lineWidth = 3;
                if (building.type.includes('town_center')) {
                    // 城镇中心边框
                    ctx.strokeRect(x, y + size * 0.3, size, size * 0.7);
                    ctx.strokeRect(x + size * 0.3, y, size * 0.4, size * 0.5);
                } else if (building.type === 'barracks') {
                    // 兵营边框
                    ctx.strokeRect(x, y + size * 0.2, size, size * 0.8);
                } else if (building.type === 'farm') {
                    // 农场边框
                    ctx.strokeRect(x, y, size, size);
                } else if (building.type === 'market') {
                    // 市场边框
                    ctx.beginPath();
                    ctx.arc(building.x, building.y, size * 0.4, 0, Math.PI * 2);
                    ctx.stroke();
                } else {
                    // 其他建筑边框
                    ctx.strokeRect(x, y, size, size);
                }
                
                // 建筑图标
                ctx.font = `bold ${size * 0.4}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = isEnemy ? '#FF6B6B' : '#FFD700';
                ctx.fillText(BUILDING_ICONS[building.type] || '🏠', building.x, building.y);
                
                // 建筑类型标签
                const buildingLabels = {
                    town_center: '城镇中心',
                    town_center_age2: '城堡',
                    town_center_age3: '皇宫',
                    barracks: '兵营',
                    siege_workshop: '攻城厂',
                    farm: '农场',
                    market: '市场',
                    lumber_camp: '木材厂',
                    mill: '磨坊',
                    mining_camp: '矿厂',
                    wall: '围墙',
                    watch_tower: '箭塔',
                    castle_tower: '炮楼'
                };
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 11px Arial';
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                const label = buildingLabels[building.type] || '建筑';
                ctx.strokeText(label, building.x, y - 15);
                ctx.fillText(label, building.x, y - 15);
                
                // 血条 - 更美观
                const healthPercent = building.health / building.maxHealth;
                const barHeight = 8;
                const barWidth = size * 0.8;
                
                // 血条背景
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(building.x - barWidth/2 - 1, y - barHeight - 8, barWidth + 2, barHeight + 2);
                
                // 血条底色
                ctx.fillStyle = 'rgba(51,51,51,0.8)';
                ctx.fillRect(building.x - barWidth/2, y - barHeight - 7, barWidth, barHeight);
                
                // 血条
                const healthColor = healthPercent > 0.6 ? '#00ff00' : healthPercent > 0.3 ? '#ffff00' : '#ff0000';
                ctx.fillStyle = healthColor;
                ctx.fillRect(building.x - barWidth/2, y - barHeight - 7, barWidth * healthPercent, barHeight);
                
                // 血条高光
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.fillRect(building.x - barWidth/2, y - barHeight - 7, barWidth * healthPercent, barHeight/2);
                
                // 健康百分比
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 8px Arial';
                ctx.textAlign = 'center';
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1;
                ctx.strokeText(`${Math.round(healthPercent * 100)}%`, building.x, y - barHeight - 4);
                ctx.fillText(`${Math.round(healthPercent * 100)}%`, building.x, y - barHeight - 4);
            });
        }

        function drawUnits() {
            gameData.units.forEach(unit => {
                const typeInfo = ENTITY_TYPES[unit.type];
                const size = typeInfo.size;
                const isSelected = selectedUnits.includes(unit.id);
                const isEnemy = unit.playerColor === 'red';
                const baseColor = isEnemy ? '#DC143C' : '#4169E1';
                const darkColor = isEnemy ? '#8B0000' : '#1E3A8A';
                const lightColor = isEnemy ? '#FF6B6B' : '#6495ED';
                
                // 绘制阴影
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.beginPath();
                ctx.ellipse(unit.x + 2, unit.y + size - 2, size * 0.8, size * 0.3, 0, 0, Math.PI * 2);
                ctx.fill();
                
                if (isSelected) {
                    // 选中光环
                    ctx.strokeStyle = '#00ff00';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(unit.x, unit.y, size + 8, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.fillStyle = 'rgba(0,255,0,0.2)';
                    ctx.beginPath();
                    ctx.arc(unit.x, unit.y, size + 8, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // 只对非农民单位绘制背景和描边
                if (unit.type !== 'villager') {
                    ctx.fillStyle = isEnemy ? 'rgba(220,20,60,0.3)' : 'rgba(65,105,225,0.3)';
                    ctx.beginPath();
                    ctx.arc(unit.x, unit.y, size + 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = isEnemy ? '#DC143C' : '#4169E1';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
                
                if (unit.type === 'villager') {
                    // 村民 - 简化但清晰的风格
                    // 身体
                    ctx.fillStyle = '#DEB887';
                    ctx.beginPath();
                    ctx.arc(unit.x, unit.y, 10, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#8B7355';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    // 衣服
                    ctx.fillStyle = darkColor;
                    ctx.beginPath();
                    ctx.arc(unit.x, unit.y, 10, Math.PI * 0.8, Math.PI * 2.2);
                    ctx.fill();
                    
                    // 头部
                    ctx.fillStyle = '#F4A460';
                    ctx.beginPath();
                    ctx.arc(unit.x, unit.y - 8, 7, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#8B7355';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    
                    // 工具图标
                    ctx.fillStyle = '#8B4513';
                    ctx.font = 'bold 12px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('⚒', unit.x, unit.y + 4);
                    
                } else if (unit.type === 'soldier') {
                    // 士兵 - 盾牌和剑
                    // 身体
                    ctx.fillStyle = baseColor;
                    ctx.beginPath();
                    ctx.arc(unit.x, unit.y, 12, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = darkColor;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    // 头盔
                    ctx.fillStyle = '#C0C0C0';
                    ctx.beginPath();
                    ctx.arc(unit.x, unit.y - 6, 8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#808080';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    
                    // 盾牌
                    ctx.fillStyle = darkColor;
                    ctx.beginPath();
                    ctx.arc(unit.x - 8, unit.y + 2, 7, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#FFD700';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    // 剑
                    ctx.strokeStyle = '#C0C0C0';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(unit.x + 8, unit.y - 5);
                    ctx.lineTo(unit.x + 15, unit.y + 10);
                    ctx.stroke();
                    
                } else if (unit.type === 'knight') {
                    // 骑士 - 马和骑手
                    // 马身
                    ctx.fillStyle = '#8B4513';
                    ctx.beginPath();
                    ctx.ellipse(unit.x, unit.y + 3, 14, 10, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#654321';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    // 马头
                    ctx.fillStyle = '#8B4513';
                    ctx.beginPath();
                    ctx.ellipse(unit.x - 10, unit.y - 3, 7, 5, -0.5, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // 骑手身体
                    ctx.fillStyle = baseColor;
                    ctx.beginPath();
                    ctx.arc(unit.x + 3, unit.y - 5, 8, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // 骑手头盔
                    ctx.fillStyle = '#FFD700';
                    ctx.beginPath();
                    ctx.arc(unit.x + 3, unit.y - 12, 6, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#B8860B';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    
                    // 长矛
                    ctx.strokeStyle = '#8B4513';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(unit.x + 12, unit.y - 5);
                    ctx.lineTo(unit.x + 22, unit.y - 20);
                    ctx.stroke();
                    
                } else if (unit.type === 'archer') {
                    // 弓箭手
                    // 身体
                    ctx.fillStyle = '#228B22';
                    ctx.beginPath();
                    ctx.arc(unit.x, unit.y, 11, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#006400';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    // 头
                    ctx.fillStyle = '#DEB887';
                    ctx.beginPath();
                    ctx.arc(unit.x, unit.y - 8, 7, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // 弓
                    ctx.strokeStyle = '#8B4513';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(unit.x + 10, unit.y, 10, -Math.PI/2, Math.PI/2);
                    ctx.stroke();
                    
                    // 弓弦
                    ctx.strokeStyle = '#F5F5DC';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(unit.x + 10, unit.y - 10);
                    ctx.lineTo(unit.x + 10, unit.y + 10);
                    ctx.stroke();
                    
                    // 箭
                    ctx.strokeStyle = '#8B4513';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(unit.x + 5, unit.y - 8);
                    ctx.lineTo(unit.x + 18, unit.y - 15);
                    ctx.stroke();
                    
                } else if (unit.type === 'trader') {
                    // 商人
                    // 骆驼/驴
                    ctx.fillStyle = '#CD853F';
                    ctx.beginPath();
                    ctx.ellipse(unit.x - 5, unit.y + 2, 12, 8, 0, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // 货物
                    ctx.fillStyle = '#8B4513';
                    ctx.fillRect(unit.x - 5, unit.y - 8, 14, 10);
                    ctx.strokeStyle = '#654321';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(unit.x - 5, unit.y - 8, 14, 10);
                    
                    // 商人
                    ctx.fillStyle = '#DEB887';
                    ctx.beginPath();
                    ctx.arc(unit.x + 8, unit.y - 5, 6, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // 金币标记
                    ctx.fillStyle = '#FFD700';
                    ctx.font = 'bold 10px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('$', unit.x + 2, unit.y + 2);
                    
                } else if (unit.type === 'catapult') {
                    // 投石车
                    // 底座
                    ctx.fillStyle = '#654321';
                    ctx.fillRect(unit.x - 15, unit.y + 5, 30, 10);
                    
                    // 轮子
                    ctx.fillStyle = '#333';
                    ctx.beginPath();
                    ctx.arc(unit.x - 12, unit.y + 15, 6, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(unit.x + 12, unit.y + 15, 6, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // 支架
                    ctx.fillStyle = '#8B4513';
                    ctx.beginPath();
                    ctx.moveTo(unit.x - 5, unit.y + 5);
                    ctx.lineTo(unit.x, unit.y - 15);
                    ctx.lineTo(unit.x + 5, unit.y + 5);
                    ctx.closePath();
                    ctx.fill();
                    
                    // 弹弓
                    ctx.fillStyle = '#654321';
                    ctx.beginPath();
                    ctx.arc(unit.x, unit.y - 15, 8, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // 石头
                    ctx.fillStyle = '#808080';
                    ctx.beginPath();
                    ctx.arc(unit.x, unit.y - 18, 5, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // 血条 - 更清晰
                const healthPercent = unit.health / unit.maxHealth;
                const barWidth = size * 1.5;
                const barHeight = 6;
                const barY = unit.y - size - 15;
                
                // 血条背景
                ctx.fillStyle = '#000';
                ctx.fillRect(unit.x - barWidth/2 - 1, barY - 1, barWidth + 2, barHeight + 2);
                
                // 血条
                ctx.fillStyle = '#333';
                ctx.fillRect(unit.x - barWidth/2, barY, barWidth, barHeight);
                
                const healthColor = healthPercent > 0.6 ? '#00ff00' : healthPercent > 0.3 ? '#ffff00' : '#ff0000';
                ctx.fillStyle = healthColor;
                ctx.fillRect(unit.x - barWidth/2, barY, barWidth * healthPercent, barHeight);
                
                // 血条高光
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillRect(unit.x - barWidth/2, barY, barWidth * healthPercent, barHeight/2);
                
                // 单位类型标签（小）
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 9px Arial';
                ctx.textAlign = 'center';
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                const typeLabels = {
                    villager: '村',
                    soldier: '兵',
                    knight: '骑',
                    archer: '弓',
                    trader: '商',
                    catapult: '车'
                };
                const label = typeLabels[unit.type] || '?';
                ctx.strokeText(label, unit.x, unit.y + size + 12);
                ctx.fillText(label, unit.x, unit.y + size + 12);
                
                // 农民携带资源显示
                if (unit.type === 'villager' && unit.carrying) {
                    const resourceIcons = {
                        wood: '🪵',
                        food: '🌾',
                        gold: '💰',
                        stone: '🪨'
                    };
                    ctx.font = 'bold 12px Arial';
                    ctx.fillText(resourceIcons[unit.carrying] || '📦', unit.x, unit.y - size - 20);
                    ctx.font = 'bold 8px Arial';
                    ctx.fillStyle = '#ffd700';
                    ctx.fillText(unit.carryAmount, unit.x + 10, unit.y - size - 20);
                }
                
                if (unit.targetX !== null && unit.targetY !== null) {
                    // 移动目标线
                    ctx.strokeStyle = isEnemy ? 'rgba(255,0,0,0.4)' : 'rgba(0,255,0,0.4)';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([5, 5]);
                    ctx.beginPath();
                    ctx.moveTo(unit.x, unit.y);
                    ctx.lineTo(unit.targetX, unit.targetY);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    
                    // 目标点标记
                    ctx.fillStyle = isEnemy ? 'rgba(255,0,0,0.3)' : 'rgba(0,255,0,0.3)';
                    ctx.beginPath();
                    ctx.arc(unit.targetX, unit.targetY, 5, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function drawSelection() {
            if (isSelecting) {
                const worldStart = getWorldPos(selectionStart.x, selectionStart.y);
                const worldEnd = getWorldPos(mousePos.x, mousePos.y);
                
                const minX = Math.min(worldStart.x, worldEnd.x);
                const maxX = Math.max(worldStart.x, worldEnd.x);
                const minY = Math.min(worldStart.y, worldEnd.y);
                const maxY = Math.max(worldStart.y, worldEnd.y);
                
                ctx.strokeStyle = '#FFD700';
                ctx.lineWidth = 2;
                ctx.strokeRect(minX, minY, maxX - minX, maxY - minY);
                ctx.fillStyle = 'rgba(255, 215, 0, 0.1)';
                ctx.fillRect(minX, minY, maxX - minX, maxY - minY);
            }
        }

        function drawBuildPreview() {
            const worldPos = getWorldPos(mousePos.x, mousePos.y);
            const buildingSize = ENTITY_TYPES[buildMode].size;
            const x = worldPos.x - buildingSize / 2;
            const y = worldPos.y - buildingSize / 2;
            const isValid = !checkBuildingCollision(worldPos.x, worldPos.y, buildingSize);
            
            ctx.fillStyle = isValid ? 'rgba(0, 255, 0, 0.3)' : 'rgba(255, 0, 0, 0.3)';
            ctx.fillRect(x, y, buildingSize, buildingSize);
            ctx.strokeStyle = isValid ? '#00ff00' : '#ff0000';
            ctx.lineWidth = 3;
            ctx.strokeRect(x, y, buildingSize, buildingSize);
        }
        
        function drawTerrainFeatures() {
            gameData.terrainFeatures.forEach(feature => {
                if (feature.type === 'lake') {
                    // 湖泊
                    ctx.fillStyle = '#4682B4';
                    ctx.beginPath();
                    ctx.arc(feature.x, feature.y, feature.size / 2, 0, Math.PI * 2);
                    ctx.fill();
                    // 湖泊边缘
                    ctx.fillStyle = '#5F9EA0';
                    ctx.beginPath();
                    ctx.arc(feature.x, feature.y, feature.size / 2 + 10, 0, Math.PI * 2);
                    ctx.fill();
                } else if (feature.type === 'mountain') {
                    // 山脉
                    ctx.fillStyle = '#8B4513';
                    ctx.beginPath();
                    ctx.arc(feature.x, feature.y, feature.size / 2, 0, Math.PI * 2);
                    ctx.fill();
                    // 山顶
                    ctx.fillStyle = '#A0522D';
                    ctx.beginPath();
                    ctx.arc(feature.x, feature.y, feature.size / 3, 0, Math.PI * 2);
                    ctx.fill();
                } else if (feature.type === 'grass') {
                    // 草地
                    ctx.fillStyle = '#32CD32';
                    ctx.beginPath();
                    ctx.arc(feature.x, feature.y, feature.size / 2, 0, Math.PI * 2);
                    ctx.fill();
                } else if (feature.type === 'forest') {
                    // 森林
                    ctx.fillStyle = '#228B22';
                    ctx.beginPath();
                    ctx.arc(feature.x, feature.y, feature.size / 2, 0, Math.PI * 2);
                    ctx.fill();
                    // 森林边缘
                    ctx.fillStyle = '#2E8B57';
                    ctx.beginPath();
                    ctx.arc(feature.x, feature.y, feature.size / 2 + 15, 0, Math.PI * 2);
                    ctx.fill();
                } else if (feature.type === 'desert') {
                    // 沙漠
                    ctx.fillStyle = '#F0DC82';
                    ctx.beginPath();
                    ctx.arc(feature.x, feature.y, feature.size / 2, 0, Math.PI * 2);
                    ctx.fill();
                    // 沙漠边缘
                    ctx.fillStyle = '#DEB887';
                    ctx.beginPath();
                    ctx.arc(feature.x, feature.y, feature.size / 2 + 15, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }
        
        function drawTradePosts() {
            gameData.tradePosts.forEach(post => {
                // 贸易站底座
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(post.x - post.size / 2, post.y - post.size / 2, post.size, post.size);
                // 贸易站纹理

                ctx.lineWidth = 2;
                ctx.strokeRect(post.x - post.size / 2, post.y - post.size / 2, post.size, post.size);
                // 贸易站图标
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('🏪', post.x, post.y + 5);
                // 贸易站标签
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 12px Arial';
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.strokeText('贸易站', post.x, post.y - post.size / 2 - 10);
                ctx.fillText('贸易站', post.x, post.y - post.size / 2 - 10);
            });
        }
        
        function drawAnimals() {
            gameData.animals.forEach(animal => {
                if (animal.type === 'sheep') {
                    // 羊身体
                    ctx.fillStyle = '#FFFFFF';
                    ctx.beginPath();
                    ctx.ellipse(animal.x, animal.y, 12, 10, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // 羊头
                    ctx.beginPath();
                    ctx.ellipse(animal.x - 10, animal.y - 3, 6, 5, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // 羊腿
                    ctx.fillStyle = '#000000';
                    ctx.fillRect(animal.x - 8, animal.y + 8, 3, 6);
                    ctx.fillRect(animal.x - 3, animal.y + 8, 3, 6);
                    ctx.fillRect(animal.x + 2, animal.y + 8, 3, 6);
                    ctx.fillRect(animal.x + 7, animal.y + 8, 3, 6);
                    // 羊角
                    ctx.strokeStyle = '#A0522D';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(animal.x - 10, animal.y - 7);
                    ctx.lineTo(animal.x - 15, animal.y - 12);
                    ctx.moveTo(animal.x - 10, animal.y - 7);
                    ctx.lineTo(animal.x - 15, animal.y - 2);
                    ctx.stroke();
                    // 羊眼睛
                    ctx.fillStyle = '#000000';
                    ctx.beginPath();
                    ctx.arc(animal.x - 8, animal.y - 4, 1, 0, Math.PI * 2);
                    ctx.fill();
                } else if (animal.type === 'deer') {
                    // 鹿身体
                    ctx.fillStyle = '#8B4513';
                    ctx.beginPath();
                    ctx.ellipse(animal.x, animal.y, 15, 12, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // 鹿头
                    ctx.beginPath();
                    ctx.ellipse(animal.x - 12, animal.y - 5, 8, 6, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // 鹿腿
                    ctx.fillStyle = '#654321';
                    ctx.fillRect(animal.x - 10, animal.y + 10, 4, 8);
                    ctx.fillRect(animal.x - 4, animal.y + 10, 4, 8);
                    ctx.fillRect(animal.x + 2, animal.y + 10, 4, 8);
                    ctx.fillRect(animal.x + 8, animal.y + 10, 4, 8);
                    // 鹿角
                    ctx.strokeStyle = '#A0522D';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(animal.x - 12, animal.y - 10);
                    ctx.lineTo(animal.x - 18, animal.y - 18);
                    ctx.lineTo(animal.x - 20, animal.y - 14);
                    ctx.moveTo(animal.x - 12, animal.y - 10);
                    ctx.lineTo(animal.x - 18, animal.y - 5);
                    ctx.lineTo(animal.x - 20, animal.y - 9);
                    ctx.stroke();
                    // 鹿眼睛
                    ctx.fillStyle = '#000000';
                    ctx.beginPath();
                    ctx.arc(animal.x - 10, animal.y - 6, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                } else if (animal.type === 'boar') {
                    // 野猪身体
                    ctx.fillStyle = '#8B4513';
                    ctx.beginPath();
                    ctx.ellipse(animal.x, animal.y, 18, 14, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // 野猪头
                    ctx.beginPath();
                    ctx.ellipse(animal.x - 14, animal.y - 3, 10, 8, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // 野猪腿
                    ctx.fillStyle = '#654321';
                    ctx.fillRect(animal.x - 12, animal.y + 12, 5, 10);
                    ctx.fillRect(animal.x - 5, animal.y + 12, 5, 10);
                    ctx.fillRect(animal.x + 1, animal.y + 12, 5, 10);
                    ctx.fillRect(animal.x + 8, animal.y + 12, 5, 10);
                    // 野猪獠牙
                    ctx.fillStyle = '#FFFFFF';
                    ctx.beginPath();
                    ctx.moveTo(animal.x - 24, animal.y);
                    ctx.lineTo(animal.x - 28, animal.y + 4);
                    ctx.lineTo(animal.x - 22, animal.y + 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(animal.x - 24, animal.y - 2);
                    ctx.lineTo(animal.x - 28, animal.y - 6);
                    ctx.lineTo(animal.x - 22, animal.y - 4);
                    ctx.fill();
                    // 野猪眼睛
                    ctx.fillStyle = '#000000';
                    ctx.beginPath();
                    ctx.arc(animal.x - 12, animal.y - 4, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }
        
        function drawSmokeEffects() {
            const now = Date.now();
            gameData.smokeEffects.forEach(effect => {
                const progress = (now - effect.time) / effect.duration;
                const alpha = 1 - progress;
                const size = effect.size + progress * 20;
                
                ctx.fillStyle = `rgba(128, 128, 128, ${alpha * 0.5})`;
                ctx.beginPath();
                ctx.arc(effect.x, effect.y - progress * 50, size, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = `rgba(160, 160, 160, ${alpha * 0.3})`;
                ctx.beginPath();
                ctx.arc(effect.x + 5, effect.y - progress * 55, size * 0.8, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        // 商队贸易更新
        function updateTraders(now, dt) {
            const traders = gameData.units.filter(u => u.type === 'trader');
            
            traders.forEach(trader => {
                // 如果正在攻击，不贸易
                if (trader.attackTarget) return;
                
                // 商队状态：idle, traveling, trading
                if (!trader.state) {
                    trader.state = 'idle';
                }
                
                if (trader.state === 'idle') {
                    // 寻找最近的贸易站
                    let closestTradePost = null;
                    let closestDistance = Infinity;
                    
                    gameData.tradePosts.forEach(post => {
                        const distance = Math.sqrt(Math.pow(post.x - trader.x, 2) + Math.pow(post.y - trader.y, 2));
                        if (distance < closestDistance) {
                            closestDistance = distance;
                            closestTradePost = post;
                        }
                    });
                    
                    if (closestTradePost) {
                        trader.targetX = closestTradePost.x;
                        trader.targetY = closestTradePost.y;
                        trader.targetTradePost = closestTradePost;
                        trader.state = 'traveling';
                    }
                    
                } else if (trader.state === 'traveling') {
                    if (trader.targetTradePost) {
                        const distance = Math.sqrt(Math.pow(trader.targetTradePost.x - trader.x, 2) + Math.pow(trader.targetTradePost.y - trader.y, 2));
                        
                        if (distance > 30) {
                            // 向贸易站移动
                            const dx = trader.targetTradePost.x - trader.x;
                            const dy = trader.targetTradePost.y - trader.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            const speed = ENTITY_TYPES[trader.type].speed * 60;
                            trader.x += (dx / dist) * speed * dt;
                            trader.y += (dy / dist) * speed * dt;
                        } else {
                            // 到达贸易站，开始贸易
                            trader.targetX = null;
                            trader.targetY = null;
                            trader.state = 'trading';
                            trader.tradeStartTime = now;
                        }
                    } else {
                        // 贸易站不存在，回到 idle 状态
                        trader.state = 'idle';
                        trader.targetTradePost = null;
                    }
                    
                } else if (trader.state === 'trading') {
                    // 贸易时间：3秒
                    if (now - trader.tradeStartTime > 3000) {
                        // 贸易完成，获得金币
                        const tradeAmount = 20 + Math.random() * 10; // 每次贸易获得20-30单位金币
                        gameData.resources.gold += tradeAmount;
                        
                        // 更新资源显示
                        updateResourceDisplay();
                        
                        // 寻找下一个贸易站
                        let nextTradePost = null;
                        let minDistance = Infinity;
                        
                        gameData.tradePosts.forEach(post => {
                            if (post.id === trader.targetTradePost.id) return;
                            const distance = Math.sqrt(Math.pow(post.x - trader.x, 2) + Math.pow(post.y - trader.y, 2));
                            if (distance < minDistance) {
                                minDistance = distance;
                                nextTradePost = post;
                            }
                        });
                        
                        if (nextTradePost) {
                            trader.targetX = nextTradePost.x;
                            trader.targetY = nextTradePost.y;
                            trader.targetTradePost = nextTradePost;
                            trader.state = 'traveling';
                        } else {
                            // 没有其他贸易站，回到 idle 状态
                            trader.state = 'idle';
                            trader.targetTradePost = null;
                        }
                    }
                }
            });
        }

        function renderMinimap() {
            minimapCtx.fillStyle = '#3d6b4a';
            minimapCtx.fillRect(0, 0, 200, 150);
            
            const scaleX = 200 / MAP_WIDTH;
            const scaleY = 150 / MAP_HEIGHT;
            
            // 绘制地形特征
            gameData.terrainFeatures.forEach(feature => {
                if (feature.type === 'lake') {
                    minimapCtx.fillStyle = '#4682B4';
                } else if (feature.type === 'mountain') {
                    minimapCtx.fillStyle = '#8B4513';
                } else if (feature.type === 'grass') {
                    minimapCtx.fillStyle = '#32CD32';
                }
                minimapCtx.beginPath();
                minimapCtx.arc(feature.x * scaleX, feature.y * scaleY, feature.size * scaleX / 2, 0, Math.PI * 2);
                minimapCtx.fill();
            });
            
            // 绘制贸易站
            gameData.tradePosts.forEach(post => {
                minimapCtx.fillStyle = '#FFD700';
                minimapCtx.fillRect(post.x * scaleX - 4, post.y * scaleY - 4, 8, 8);
            });
            
            // 绘制动物
            gameData.animals.forEach(animal => {
                minimapCtx.fillStyle = '#FFFFFF';
                minimapCtx.beginPath();
                minimapCtx.arc(animal.x * scaleX, animal.y * scaleY, 1.5, 0, Math.PI * 2);
                minimapCtx.fill();
            });
            
            // 绘制建筑
            gameData.buildings.forEach(building => {
                minimapCtx.fillStyle = building.playerColor === 'blue' ? '#4169E1' : '#DC143C';
                minimapCtx.fillRect(building.x * scaleX - 3, building.y * scaleY - 3, 6, 6);
            });
            
            // 绘制单位
            gameData.units.forEach(unit => {
                minimapCtx.fillStyle = unit.playerColor === 'blue' ? '#00FF00' : '#FF0000';
                minimapCtx.beginPath();
                minimapCtx.arc(unit.x * scaleX, unit.y * scaleY, 2, 0, Math.PI * 2);
                minimapCtx.fill();
            });
            
            // 绘制视口
            const viewX = camera.x * scaleX;
            const viewY = camera.y * scaleY;
            const viewW = gameCanvas.width * scaleX;
            const viewH = gameCanvas.height * scaleY;
            minimapCtx.strokeStyle = '#FFD700';
            minimapCtx.lineWidth = 1;
            minimapCtx.strokeRect(viewX, viewY, viewW, viewH);
        }
    </script>
